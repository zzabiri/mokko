<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>예약 관리 · Mokko Staff</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #0e0e0e; --surface:  #161616; --surface2: #1e1e1e;
      --border:   #2a2a2a; --text:     #e8e3db; --muted:    #7a7068;
      --accent:   #c9a96e; --green:    #4caf82; --red:      #e05a5a;
      --blue:     #5a9ae0; --font-sans:'Noto Sans KR',sans-serif;
      --font-serif:'Noto Serif JP',serif; --ease: 0.2s ease;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--text); font-family: var(--font-sans);
      font-weight: 300; font-size: 14px; line-height: 1.6;
      -webkit-font-smoothing: antialiased; min-height: 100svh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; font-family: var(--font-sans); }

    /* ── PIN 화면 ── */
    #pin-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--bg); display: flex;
      align-items: center; justify-content: center;
    }
    .pin-wrap {
      text-align: center; padding: 40px 24px; max-width: 320px; width: 100%;
    }
    .pin-logo {
      font-family: var(--font-serif); font-size: 1.4rem;
      letter-spacing: 0.12em; color: var(--accent); margin-bottom: 6px;
    }
    .pin-sub {
      font-size: 0.68rem; letter-spacing: 0.25em;
      color: var(--muted); margin-bottom: 36px; text-transform: uppercase;
    }
    #pinInput {
      width: 100%; height: 58px; text-align: center; font-size: 1.6rem;
      letter-spacing: 0.4em; background: var(--surface);
      border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--font-sans);
      margin-bottom: 12px; -webkit-appearance: none;
      transition: border-color var(--ease);
    }
    #pinInput:focus { outline: none; border-color: var(--accent); }
    #pinInput.shake {
      animation: shake 0.4s ease;
      border-color: var(--red) !important;
    }
    @keyframes shake {
      0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)}
      40%{transform:translateX(8px)} 60%{transform:translateX(-6px)}
      80%{transform:translateX(6px)}
    }
    .btn-pin-confirm {
      width: 100%; height: 52px; background: var(--accent);
      border: none; border-radius: 6px; color: #0e0e0e;
      font-size: 0.84rem; font-weight: 500; letter-spacing: 0.1em;
      transition: opacity var(--ease);
    }
    .btn-pin-confirm:hover { opacity: 0.85; }
    #pinError {
      margin-top: 12px; color: var(--red);
      font-size: 0.78rem; min-height: 20px;
    }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(14,14,14,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 20px; height: 54px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-badge {
      font-size: 0.68rem; letter-spacing: 0.12em; color: #0e0e0e;
      background: var(--accent); padding: 2px 8px; border-radius: 20px; font-weight: 500;
    }
    .nav-logo { font-family: var(--font-serif); font-size: 0.9rem; letter-spacing: 0.08em; color: var(--accent); }
    .nav-actions { display: flex; align-items: center; gap: 8px; }
    .btn-sm {
      height: 34px; padding: 0 14px; font-size: 0.74rem; letter-spacing: 0.06em;
      border-radius: 4px; border: 1px solid var(--border);
      background: var(--surface); color: var(--muted); transition: var(--ease);
    }
    .btn-sm:hover { color: var(--text); border-color: var(--muted); }
    .btn-sm.danger { border-color: rgba(224,90,90,0.4); color: var(--red); }
    .btn-sm.danger:hover { background: rgba(224,90,90,0.1); }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── 통계 카드 ── */
    .stats-row { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin-bottom: 24px; max-width: 560px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
    .stat-label { font-size: 0.68rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-size: 1.6rem; font-weight: 500; color: var(--text); line-height: 1; }
    .stat-unit { font-size: 0.8rem; color: var(--muted); font-weight: 300; margin-left: 2px; }
    .stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 4px; }

    /* ── 탭 ── */
    .view-tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .view-tab {
      height: 42px; padding: 0 18px; font-size: 0.78rem; letter-spacing: 0.04em;
      background: none; border: none; border-bottom: 2px solid transparent;
      color: var(--muted); transition: var(--ease);
    }
    .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .view-tab:hover:not(.active) { color: var(--text); }

    /* ── 날짜 네비게이션 ── */
    .date-nav { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 20px; }
    .date-nav-title { font-family: var(--font-serif); font-size: 1rem; letter-spacing: 0.04em; text-align: center; flex: 1; }
    .btn-nav {
      width: 36px; height: 36px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center; transition: var(--ease); flex-shrink: 0;
    }
    .btn-nav:hover { border-color: var(--accent); color: var(--accent); }
    .btn-today {
      height: 36px; padding: 0 12px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; color: var(--muted); font-size: 0.74rem; letter-spacing: 0.06em; transition: var(--ease); flex-shrink: 0;
    }
    .btn-today:hover { border-color: var(--accent); color: var(--accent); }

    /* ── 주간 뷰 ── */
    #week-view { display: none; } #day-view { display: block; } #list-view { display: none; } #settings-view { display: none; }
    .week-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid var(--border); border-radius: 8px; }
    .week-table { min-width: 700px; width: 100%; border-collapse: collapse; }
    .week-table th {
      background: var(--surface); padding: 10px 8px; text-align: center;
      font-size: 0.72rem; letter-spacing: 0.08em; font-weight: 500;
      border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
    }
    .week-table th:last-child { border-right: none; }
    .week-table th .th-day { font-size: 0.68rem; color: var(--muted); margin-bottom: 2px; }
    .week-table th .th-date { font-size: 1rem; font-weight: 500; }
    .week-table th.today-col .th-date { color: var(--accent); }
    .week-table th.sat-col .th-day { color: var(--blue); }
    .week-table th.closed-col { opacity: 0.4; }
    .week-table td {
      padding: 6px; vertical-align: top;
      border-bottom: 1px solid var(--border); border-right: 1px solid var(--border);
      min-height: 60px; width: calc(100%/7);
    }
    .week-table td:last-child { border-right: none; }
    .week-table td.time-cell {
      width: 52px; background: var(--surface); text-align: center;
      font-size: 0.72rem; color: var(--muted); padding: 8px 4px;
      vertical-align: middle; white-space: nowrap;
    }
    .week-table tr:last-child td { border-bottom: none; }
    .week-table td.closed-cell {
      background: repeating-linear-gradient(45deg,transparent,transparent 4px,rgba(42,42,42,0.4) 4px,rgba(42,42,42,0.4) 6px);
    }
    .res-chip {
      background: rgba(201,169,110,0.15); border: 1px solid rgba(201,169,110,0.3);
      border-radius: 4px; padding: 5px 7px; margin-bottom: 4px;
      font-size: 0.7rem; cursor: pointer; transition: background var(--ease); line-height: 1.4;
    }
    .res-chip:hover { background: rgba(201,169,110,0.25); }
    .res-chip .chip-name { font-weight: 500; color: var(--text); }
    .res-chip .chip-ppl  { color: var(--accent); font-weight: 500; }
    .res-chip .chip-ph   { color: var(--muted); font-size: 0.65rem; }
    .slot-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; font-size: 0.65rem; color: var(--muted); }
    .slot-pax.ok   { color: var(--green); } .slot-pax.warn { color: #e0a85a; } .slot-pax.full { color: var(--red); }

    /* ── 일별 뷰 ── */
    .day-schedule { display: flex; flex-direction: column; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .day-slot { display: flex; border-bottom: 1px solid var(--border); }
    .day-slot:last-child { border-bottom: none; }
    .day-time { width: 64px; flex-shrink: 0; background: var(--surface); padding: 12px 10px; font-size: 0.78rem; color: var(--muted); border-right: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: center; }
    .day-res-area { flex: 1; padding: 8px 12px; min-height: 64px; }
    .day-cap-info { font-size: 0.72rem; color: var(--muted); margin-bottom: 6px; }
    .day-res-list { display: flex; flex-direction: column; gap: 6px; }
    .day-res-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 14px; cursor: pointer; transition: border-color var(--ease); }
    .day-res-card:hover { border-color: var(--accent); }
    .day-res-card .rc-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .day-res-card .rc-name { font-weight: 500; font-size: 0.88rem; }
    .day-res-card .rc-ppl  { color: var(--accent); font-weight: 500; font-size: 0.88rem; }
    .day-res-card .rc-ph   { font-size: 0.78rem; color: var(--muted); }
    .empty-slot { font-size: 0.76rem; color: var(--muted); font-style: italic; }

    /* ── 일별 뷰 좌우 분할 레이아웃 ── */
    .day-layout { display: grid; grid-template-columns: 30% 1fr; gap: 16px; }
    .day-schedule-col { display: flex; flex-direction: column; min-height: 0; }
    .day-schedule-col .day-schedule { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; }
    .day-fp-col .fp-wrap { margin-top: 0; }
    @media (max-width: 767px) {
      .day-layout { grid-template-columns: 1fr; }
      .day-schedule-col .day-schedule { min-height: 0; max-height: 400px; }
    }

    /* ── 목록 뷰 ── */
    .list-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .list-filter-btn {
      height: 32px; padding: 0 12px; font-size: 0.72rem; letter-spacing: 0.04em;
      border-radius: 20px; border: 1px solid var(--border); background: none;
      color: var(--muted); transition: var(--ease);
    }
    .list-filter-btn.active { background: var(--accent); border-color: var(--accent); color: #0e0e0e; font-weight: 500; }
    .res-table-wrap { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; overflow-x: auto; }
    .res-table { width: 100%; min-width: 560px; border-collapse: collapse; }
    .res-table th { background: var(--surface); padding: 10px 14px; text-align: left; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; }
    .res-table td { padding: 12px 14px; border-bottom: 1px solid var(--border); font-size: 0.84rem; }
    .res-table tr:last-child td { border-bottom: none; }
    .res-table tr:hover td { background: rgba(255,255,255,0.02); }
    .res-table .td-ppl { color: var(--accent); font-weight: 500; }
    .res-table .td-ph  { color: var(--muted); font-size: 0.78rem; }
    .res-table .td-del { text-align: right; }
    .btn-del { height: 28px; padding: 0 10px; font-size: 0.7rem; border-radius: 4px; border: 1px solid rgba(224,90,90,0.3); background: transparent; color: var(--red); transition: var(--ease); }
    .btn-del:hover { background: rgba(224,90,90,0.1); }
    .empty-table { padding: 40px; text-align: center; color: var(--muted); font-size: 0.84rem; }

    /* ── 설정 뷰 ── */
    .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 24px; margin-bottom: 16px; max-width: 480px; }
    .settings-title { font-family: var(--font-serif); font-size: 0.9rem; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .settings-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .settings-field label { display: block; font-size: 0.7rem; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .settings-field input {
      width: 100%; height: 46px; padding: 0 14px; background: var(--bg);
      border: 1px solid var(--border); border-radius: 4px; color: var(--text);
      font-family: var(--font-sans); font-size: 1rem; font-weight: 400;
      transition: border-color var(--ease); -webkit-appearance: none;
    }
    .settings-field input:focus { outline: none; border-color: var(--accent); }
    .settings-note { font-size: 0.74rem; color: var(--muted); line-height: 1.7; margin-bottom: 16px; padding: 12px 14px; background: rgba(201,169,110,0.06); border-left: 2px solid rgba(201,169,110,0.4); border-radius: 0 4px 4px 0; }
    .btn-save-settings {
      height: 44px; padding: 0 24px; background: var(--accent); border: none;
      border-radius: 4px; color: #0e0e0e; font-size: 0.8rem; font-weight: 500;
      letter-spacing: 0.08em; transition: opacity var(--ease);
    }
    .btn-save-settings:hover { opacity: 0.85; }
    .settings-saved { display: inline-block; margin-left: 12px; font-size: 0.78rem; color: var(--green); opacity: 0; transition: opacity 0.3s; }
    .settings-saved.show { opacity: 1; }
    .current-cap { display: flex; gap: 20px; margin-bottom: 20px; }
    .cap-badge { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 10px 16px; text-align: center; }
    .cap-badge-val { font-size: 1.4rem; font-weight: 500; color: var(--text); }
    .cap-badge-lbl { font-size: 0.68rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

    /* ── 수동 예약 추가 ── */
    .add-form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 24px; display: none; }
    .add-form-card.open { display: block; }
    .add-form-title { font-size: 0.82rem; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 16px; font-weight: 500; }
    .add-form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media(min-width:600px) { .add-form-grid { grid-template-columns: repeat(5,1fr); } }
    .af-group label { display: block; font-size: 0.68rem; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 5px; }
    .af-group input, .af-group select { width: 100%; height: 36px; padding: 0 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--font-sans); font-size: 0.82rem; -webkit-appearance: none; }
    .af-group input:focus, .af-group select:focus { outline: none; border-color: var(--accent); }
    .af-group select option { background: #1a1a1a; }
    .add-form-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-add-save { height: 36px; padding: 0 18px; background: var(--accent); border: none; border-radius: 4px; color: #0e0e0e; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.06em; transition: opacity var(--ease); }
    .btn-add-save:hover { opacity: 0.85; }
    .btn-add-cancel { height: 36px; padding: 0 14px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); font-size: 0.78rem; transition: var(--ease); }
    .btn-add-cancel:hover { color: var(--text); }

    /* ── 모달 ── */
    .modal-bg { display: none; position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.open { display: flex; }
    .modal-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 28px; width: 100%; max-width: 400px; animation: mIn 0.2s ease; }
    @keyframes mIn { from{opacity:0;transform:scale(0.96) translateY(8px)} to{opacity:1;transform:none} }
    .modal-title { font-family: var(--font-serif); font-size: 1.1rem; font-weight: 300; margin-bottom: 16px; color: var(--accent); }
    .modal-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
    .modal-row:last-of-type { border-bottom: none; }
    .modal-row .ml { color: var(--muted); font-size: 0.75rem; }
    .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
    .btn-modal-close { flex: 1; height: 42px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-size: 0.82rem; transition: var(--ease); }
    .btn-modal-close:hover { border-color: var(--muted); }
    .btn-modal-del { flex: 1; height: 42px; background: rgba(224,90,90,0.12); border: 1px solid rgba(224,90,90,0.4); border-radius: 4px; color: var(--red); font-size: 0.82rem; transition: var(--ease); }
    .btn-modal-del:hover { background: rgba(224,90,90,0.2); }

    .today-chip { display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; margin-left: 4px; vertical-align: middle; }

    /* 로딩 */
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(201,169,110,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 좌석 배치도 ── */
    .fp-wrap { margin-top: 20px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .fp-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; background: var(--surface2);
      border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    }
    .fp-header-title { font-size: 0.78rem; letter-spacing: 0.08em; color: var(--accent); font-weight: 500; }
    .fp-legend { display: flex; gap: 12px; align-items: center; }
    .fp-leg { display: flex; align-items: center; gap: 5px; font-size: 0.66rem; color: var(--muted); }
    .fp-leg-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .fp-body { display: none; padding: 12px; background: #111827; }
    .fp-body.open { display: block; }
    #fpSvg g[onclick]:hover rect { opacity: 0.75; transition: opacity 0.15s; }

    /* 배정 모달 */
    .assign-modal-bg { display: none; position: fixed; inset: 0; z-index: 300; background: rgba(0,0,0,0.78); backdrop-filter: blur(4px); align-items: center; justify-content: center; padding: 20px; }
    .assign-modal-bg.open { display: flex; }
    .assign-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 22px; width: 100%; max-width: 340px; animation: mIn 0.18s ease; }
    .assign-modal-title { font-size: 0.88rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.05em; }
    .assign-modal-sub   { font-size: 0.72rem; color: var(--muted); margin-bottom: 14px; }
    .assign-res-list    { display: flex; flex-direction: column; gap: 6px; max-height: 270px; overflow-y: auto; margin-bottom: 14px; }
    .assign-res-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; background: var(--surface2);
      border: 1px solid var(--border); border-radius: 6px;
      cursor: pointer; font-size: 0.82rem; transition: border-color 0.15s;
    }
    .assign-res-item:hover { border-color: var(--accent); }
    .assign-res-item.cur  { border-color: var(--accent); background: rgba(201,169,110,0.1); }
    .assign-res-time  { font-size: 0.7rem; color: var(--accent); font-weight: 600; min-width: 38px; }
    .assign-res-name  { flex: 1; font-weight: 500; }
    .assign-res-ppl   { font-size: 0.7rem; color: var(--muted); }
    .assign-res-check { color: var(--accent); font-weight: 700; }
    .assign-empty     { text-align: center; padding: 20px; color: var(--muted); font-size: 0.78rem; }
    .assign-actions   { display: flex; gap: 8px; }

<script>
// ── PIN ──
const STAFF_PIN = '1234'; // ← 여기서 PIN 변경

function checkPin() {
  const val = document.getElementById('pinInput').value;
  if (val === STAFF_PIN) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('main-content').style.display = 'block';
    initApp();
  } else {
    const inp = document.getElementById('pinInput');
    inp.classList.remove('shake');
    void inp.offsetWidth; // reflow
    inp.classList.add('shake');
    inp.value = '';
    document.getElementById('pinError').textContent = 'PIN이 올바르지 않습니다';
  }
}

// ── Firebase ──
const firebaseConfig = {
  apiKey: "AIzaSyDKRtm23KJVtj8qXSRDJfCP1Lvpk4vBH3U",
  databaseURL: "https://mokko-reservation-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mokko-reservation",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── 상수 ──
const DAY_NAMES = ['일','월','화','수','목','금','토'];
const DEFAULT_TOTAL = 40;
const DEFAULT_AVAIL = 32;

const TIME_SLOTS = {
  1: ['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
  2: ['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
  3: ['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
  4: ['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
  5: ['18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
  6: ['17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'],
};
const ALL_TIMES = ['17:00','17:30','18:00','18:30','19:00','19:30','20:00','20:30','21:00','21:30'];

let reservations = {};     // Firebase 실시간 데이터
let capacity = { total: DEFAULT_TOTAL, available: DEFAULT_AVAIL };
let weekOffset = 0, dayOffset = 0, listFilter = 'upcoming', currentTab = 'day';

// ── 앱 초기화 (PIN 통과 후) ──
function initApp() {
  fpInitDefs(); // 저장된 테이블 좌표 로드
  // 예약 실시간 리스닝
  db.ref('reservations').on('value', snap => {
    reservations = snap.val() || {};
    renderCurrent();
    document.getElementById('realtimeIndicator').innerHTML =
      '<span style="color:var(--green);font-size:0.8rem">●</span> 실시간 연결됨';
  }, err => {
    document.getElementById('realtimeIndicator').innerHTML =
      '<span style="color:var(--red);font-size:0.8rem">●</span> 연결 오류';
  });

  // 용량 설정 로드
  db.ref('settings/capacity').on('value', snap => {
    const c = snap.val();
    if (c) {
      capacity = c;
      document.getElementById('cur-total').textContent = c.total;
      document.getElementById('cur-avail').textContent = c.available;
      document.getElementById('set-total').value = c.total;
      document.getElementById('set-avail').value = c.available;
    }
  });

  // 오늘 테이블 배정 리스닝 (통계용)
  const todayDs = toDateStr(new Date());
  db.ref('tableAssignments/'+todayDs).on('value', snap => {
    todayAssignments = snap.val() || {};
    renderStats();
  });

  // 날짜 기본값
  document.getElementById('af-date').value = todayDs;
  updateAfTime(todayDs);
}

// ── 헬퍼 ──
function toDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function todayStr() { return toDateStr(new Date()); }
function weekStart(offset=0) {
  const d = new Date(); d.setDate(d.getDate()-d.getDay()+1+offset*7); d.setHours(0,0,0,0); return d;
}
function addDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function formatDate(ds) {
  const d=new Date(ds+'T00:00:00'); return `${d.getMonth()+1}/${d.getDate()} (${DAY_NAMES[d.getDay()]})`;
}
function formatDateTime(iso) {
  const d=new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function getResList() {
  return Object.entries(reservations).map(([id,r]) => ({id,...r}));
}
function bookedCount(date, time) {
  return getResList().filter(r=>r.date===date&&r.time===time).reduce((s,r)=>s+r.people,0);
}

// ── 통계 ──
function renderStats() {
  const res = getResList();
  const today = todayStr();
  const todayRes = res.filter(r=>r.date===today);
  const todayPax = todayRes.reduce((s,r)=>s+r.people,0);

  // 전체 테이블 기준 잔여 계산
  const allTids      = Object.keys(FLOOR_TABLES);
  const totalTables  = allTids.length;                                          // 11
  const totalSeats   = allTids.reduce((s,t)=>s+FLOOR_TABLES[t].cap, 0);        // 40
  const assignedTids = Object.keys(todayAssignments);
  const assignedCnt  = assignedTids.length;
  const assignedSeats= assignedTids.reduce((s,t)=>s+(FLOOR_TABLES[t]?.cap||0),0);
  const remTables    = totalTables - assignedCnt;
  const remSeats     = totalSeats  - assignedSeats;
  const tblColor     = remTables<=2?'var(--red)':remTables<=5?'#e0a85a':'var(--green)';

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">오늘 예약</div>
      <div class="stat-value">${todayRes.length}<span class="stat-unit">건</span></div>
      <div class="stat-sub">${todayPax}명 예약됨</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">잔여 테이블</div>
      <div class="stat-value" style="color:${tblColor}">${remTables}<span class="stat-unit"> / ${totalTables}</span></div>
      <div class="stat-sub">${remSeats}석 남음 (전체 ${totalSeats}석 기준)</div>
    </div>`;
}

// ── 주간 뷰 ──
function renderWeek() {
  const ws = weekStart(weekOffset);
  const we = addDays(ws,5);
  const today = todayStr();
  document.getElementById('weekTitle').textContent =
    `${ws.getFullYear()}년 ${ws.getMonth()+1}월 ${ws.getDate()}일 — ${we.getMonth()+1}월 ${we.getDate()}일`;
  let html = '<thead><tr><th style="width:52px"></th>';
  for (let i=0;i<6;i++) {
    const d=addDays(ws,i), ds=toDateStr(d), dow=d.getDay();
    const isToday=ds===today;
    let cls='';
    if(isToday) cls+=' today-col';
    if(dow===6) cls+=' sat-col';
    if(!TIME_SLOTS[dow]) cls+=' closed-col';
    html+=`<th class="${cls}"><div class="th-day">${DAY_NAMES[dow]}${isToday?'<span class="today-chip"></span>':''}</div><div class="th-date">${d.getDate()}</div></th>`;
  }
  html+='</tr></thead><tbody>';

  ALL_TIMES.forEach(time=>{
    html+=`<tr><td class="time-cell">${time}</td>`;
    for(let i=0;i<6;i++){
      const d=addDays(ws,i),ds=toDateStr(d),dow=d.getDay();
      const slots=TIME_SLOTS[dow];
      if(!slots||!slots.includes(time)){html+=`<td class="closed-cell"></td>`;continue;}
      const recs=getResList().filter(r=>r.date===ds&&r.time===time);
      const total=recs.reduce((s,r)=>s+r.people,0);
      const paxCls=total>=36?'full':total>=20?'warn':'ok';
      let chips='';
      recs.forEach(r=>{chips+=`<div class="res-chip" onclick="openModal('${r.id}')"><span class="chip-name">${escH(r.name)}</span><span class="chip-ppl"> · ${r.people}명</span><div class="chip-ph">${escH(r.phone)}</div></div>`;});
      html+=`<td><div class="slot-header"><span class="slot-pax ${paxCls}">${total>0?total+'명':''}</span></div>${chips}</td>`;
    }
    html+='</tr>';
  });
  html+='</tbody>';
  document.getElementById('weekTable').innerHTML=html;
}

// ── 일별 뷰 ──
function renderDay() {
  const base=new Date(); base.setDate(base.getDate()+dayOffset);
  const ds=toDateStr(base), dow=base.getDay(), slots=TIME_SLOTS[dow]||[];
  fpListenDate(ds); // 배치도 날짜 동기화
  document.getElementById('dayTitle').textContent=
    `${base.getFullYear()}년 ${base.getMonth()+1}월 ${base.getDate()}일 (${DAY_NAMES[dow]})`;
  const container=document.getElementById('daySchedule');
  if(!slots.length){container.innerHTML=`<div style="padding:40px;text-align:center;color:var(--muted);font-size:0.84rem">일요일은 휴무입니다</div>`;return;}
  let html='';
  slots.forEach(time=>{
    const recs=getResList().filter(r=>r.date===ds&&r.time===time);
    const total=recs.reduce((s,r)=>s+r.people,0);
    const sc=total>=36?'var(--red)':total>=20?'#e0a85a':'var(--green)';
    let cards=recs.length===0?`<div class="empty-slot">예약 없음</div>`:recs.map(r=>`
      <div class="day-res-card" onclick="openModal('${r.id}')">
        <div class="rc-top"><span class="rc-name">${escH(r.name)}</span><span class="rc-ppl">${r.people}명</span></div>
        <div class="rc-ph">${escH(r.phone)}</div>
      </div>`).join('');
    html+=`<div class="day-slot"><div class="day-time">${time}</div><div class="day-res-area">
      ${total>0?`<div class="day-cap-info" style="color:${sc}">${total}명 예약</div>`:''}
      <div class="day-res-list">${cards}</div></div></div>`;
  });
  container.innerHTML=html;
}

// ── 목록 뷰 ──
function renderList() {
  const today=todayStr();
  let res=getResList();
  if(listFilter==='upcoming') res=res.filter(r=>r.date>=today);
  else if(listFilter==='today') res=res.filter(r=>r.date===today);
  res.sort((a,b)=>(a.date+a.time).localeCompare(b.date+b.time));
  const tbody=document.getElementById('resListBody');
  if(!res.length){tbody.innerHTML=`<tr><td colspan="7" class="empty-table">예약 내역이 없습니다</td></tr>`;return;}
  tbody.innerHTML=res.map(r=>`
    <tr>
      <td>${formatDate(r.date)}</td>
      <td>${r.time}</td>
      <td class="td-ppl">${r.people}명</td>
      <td>${escH(r.name)}</td>
      <td class="td-ph"><a href="tel:${escH(r.phone)}" style="color:var(--accent)">${escH(r.phone)}</a></td>
      <td style="color:var(--muted);font-size:0.76rem">${formatDateTime(r.createdAt)}</td>
      <td class="td-del"><button class="btn-del" onclick="deleteReservation('${r.id}')">취소</button></td>
    </tr>`).join('');
}

// ── 탭 전환 ──
function switchTab(tab,el) {
  currentTab=tab;
  document.querySelectorAll('.view-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  ['week-view','day-view','list-view','settings-view'].forEach(id=>{
    document.getElementById(id).style.display='none';
  });
  document.getElementById(tab+'-view').style.display='block';
  if(tab!=='settings') renderCurrent();
}

function renderCurrent() {
  renderStats();
  if(currentTab==='week') renderWeek();
  else if(currentTab==='day') renderDay();
  else if(currentTab==='list') renderList();
}

function setFilter(f,el) {
  listFilter=f;
  document.querySelectorAll('.list-filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

// ── 모달 ──
function openModal(id) {
  const r=getResList().find(x=>x.id===id);
  if(!r) return;
  const d=new Date(r.date+'T00:00:00');
  document.getElementById('modalBody').innerHTML=`
    <div class="modal-row"><span class="ml">날짜</span><span>${d.getMonth()+1}월 ${d.getDate()}일 (${DAY_NAMES[d.getDay()]})</span></div>
    <div class="modal-row"><span class="ml">시간</span><span>${r.time}</span></div>
    <div class="modal-row"><span class="ml">인원</span><span style="color:var(--accent);font-weight:500">${r.people}명</span></div>
    <div class="modal-row"><span class="ml">예약자</span><span>${escH(r.name)}</span></div>
    <div class="modal-row"><span class="ml">연락처</span><span><a href="tel:${escH(r.phone)}" style="color:var(--accent)">${escH(r.phone)}</a></span></div>
    <div class="modal-row"><span class="ml">등록</span><span style="font-size:0.78rem;color:var(--muted)">${formatDateTime(r.createdAt)}</span></div>`;
  document.getElementById('modalDelBtn').onclick=()=>{deleteReservation(id);closeModalDirect();};
  document.getElementById('detailModal').classList.add('open');
}
function closeModal(e){if(e.target.id==='detailModal')closeModalDirect();}
function closeModalDirect(){document.getElementById('detailModal').classList.remove('open');}

// ── 삭제 ──
async function deleteReservation(id) {
  if(!confirm('이 예약을 취소하시겠습니까?')) return;
  try { await db.ref('reservations/'+id).remove(); }
  catch(e){ alert('삭제 중 오류가 발생했습니다.'); }
}

// ── 전체 삭제 ──
async function clearAll() {
  if(!confirm('모든 예약 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  try { await db.ref('reservations').remove(); }
  catch(e){ alert('오류가 발생했습니다.'); }
}

// ── 수동 추가 ──
function toggleAddForm() {
  const card=document.getElementById('addFormCard');
  card.classList.toggle('open');
  if(card.classList.contains('open')){
    const today=todayStr();
    document.getElementById('af-date').value=today;
    updateAfTime(today);
  }
}
document.getElementById('af-date').addEventListener('change',function(){updateAfTime(this.value);});
function updateAfTime(ds){
  const sel=document.getElementById('af-time');
  sel.innerHTML='<option value="">선택</option>';
  if(!ds)return;
  const slots=TIME_SLOTS[new Date(ds+'T00:00:00').getDay()]||[];
  slots.forEach(t=>{const o=document.createElement('option');o.value=t;o.textContent=t;sel.appendChild(o);});
}

async function saveManual() {
  const date  =document.getElementById('af-date').value;
  const time  =document.getElementById('af-time').value;
  const people=parseInt(document.getElementById('af-people').value);
  const name  =document.getElementById('af-name').value.trim();
  const phone =document.getElementById('af-phone').value.trim();
  if(!date||!time||!people||!name||!phone){alert('모든 항목을 입력해 주세요.');return;}
  const booked=bookedCount(date,time);
  if(booked+people>capacity.available){
    if(!confirm(`가용 잔여 인원(${capacity.available-booked}명)을 초과합니다. 그래도 추가하시겠습니까?`))return;
  }
  try {
    await db.ref('reservations').push({date,time,people,name,phone,createdAt:new Date().toISOString()});
    document.getElementById('af-name').value='';
    document.getElementById('af-phone').value='';
    document.getElementById('af-people').value='';
    document.getElementById('addFormCard').classList.remove('open');
    alert('예약이 추가되었습니다.');
  } catch(e){ alert('저장 중 오류가 발생했습니다.'); }
}

// ── 좌석 설정 저장 ──
async function saveCapacity() {
  const total=parseInt(document.getElementById('set-total').value);
  const avail=parseInt(document.getElementById('set-avail').value);
  if(!total||!avail||isNaN(total)||isNaN(avail)){alert('올바른 숫자를 입력해 주세요.');return;}
  if(avail>total){alert('온라인 가용 좌석은 전체 좌석보다 클 수 없습니다.');return;}
  try {
    await db.ref('settings/capacity').set({total,available:avail});
    const msg=document.getElementById('savedMsg');
    msg.classList.add('show');
    setTimeout(()=>msg.classList.remove('show'),2000);
  } catch(e){ alert('저장 중 오류가 발생했습니다.'); }
}

// ── XSS 방지 ──
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ────────────────────────────────────────────────────────────
// ── 좌석 배치도 (SVG) ──
// ────────────────────────────────────────────────────────────

const FLOOR_TABLES = {
  'X-1':{ cap:4 },
  'A-1':{ cap:4 }, 'A-2':{ cap:2 }, 'A-3':{ cap:2 },
  'D-1':{ cap:4 }, 'D-2':{ cap:4 },
  'C-1':{ cap:2 }, 'C-2':{ cap:4 }, 'C-3':{ cap:4 },
  'B-1':{ cap:2 }, 'B-2':{ cap:4 }, 'B-3':{ cap:4 },
};

// 기본 SVG 좌표 (mokko_floor_plan_v4 기준)
const FP_TABLE_DEFS = [
  {id:'X-1', cap:4, x:69,  y:46,  w:82, h:54},
  {id:'D-1', cap:4, x:20,  y:152, w:82, h:54},
  {id:'D-2', cap:4, x:112, y:152, w:82, h:54},
  {id:'A-1', cap:4, x:453, y:26,  w:82, h:54},
  {id:'A-2', cap:2, x:453, y:96,  w:82, h:40},
  {id:'A-3', cap:2, x:453, y:152, w:82, h:40},
  {id:'C-1', cap:2, x:330, y:282, w:82, h:40},
  {id:'C-2', cap:4, x:330, y:336, w:82, h:54},
  {id:'C-3', cap:4, x:330, y:406, w:82, h:54},
  {id:'B-1', cap:2, x:455, y:282, w:82, h:40},
  {id:'B-2', cap:4, x:455, y:336, w:82, h:54},
  {id:'B-3', cap:4, x:455, y:406, w:82, h:54},
];

const FP_SWAP_ZONES = new Set(['A','B','C','D']); // X존 제외, 순서 변경 가능

let fpTableAssignments = {};
let fpCurrentDate      = null;
let fpUnsubscribe      = null;
let todayAssignments   = {};
let fpAssignModalTable = null;
let fpSwapMode         = false;  // 순서 변경 모드
let fpSwapSrc          = null;   // 첫 번째로 선택한 테이블
let fpRuntimeDefs      = null;   // 실제 사용 좌표 (교환 반영, localStorage 저장)

// ── 런타임 좌표 초기화 / 저장 ──
function fpInitDefs() {
  try {
    const saved = JSON.parse(localStorage.getItem('fpRuntimeDefs'));
    if (saved && saved.length === FP_TABLE_DEFS.length) {
      const savedIds = saved.map(t => t.id).sort().join();
      const defIds   = FP_TABLE_DEFS.map(t => t.id).sort().join();
      if (savedIds === defIds) { fpRuntimeDefs = saved; return; }
    }
  } catch {}
  fpRuntimeDefs = FP_TABLE_DEFS.map(t => ({...t}));
}
function fpSaveDefs() { localStorage.setItem('fpRuntimeDefs', JSON.stringify(fpRuntimeDefs)); }
function fpGetZone(tid) { return tid.split('-')[0]; }

// Firebase 리스너 — 날짜가 바뀔 때마다 재구독
function fpListenDate(ds) {
  if (fpCurrentDate === ds) return;
  const oldDate = fpCurrentDate;
  fpCurrentDate = ds;
  if (fpUnsubscribe && oldDate) { db.ref('tableAssignments/'+oldDate).off('value', fpUnsubscribe); fpUnsubscribe=null; }
  const ref = db.ref('tableAssignments/'+ds);
  fpUnsubscribe = ref.on('value', snap => {
    fpTableAssignments = snap.val() || {};
    fpRenderAll();
  });
}

// 배치도 열기/닫기 토글
function toggleFloorPlan() {
  const body = document.getElementById('fpBody');
  const icon = document.getElementById('fpToggleIcon');
  const open = body.classList.toggle('open');
  icon.style.transform = open ? '' : 'rotate(180deg)';
}

// 순서 변경 모드 토글
function toggleSwapMode() {
  fpSwapMode = !fpSwapMode;
  fpSwapSrc  = null;
  const btn = document.getElementById('fpSwapBtn');
  if (btn) {
    btn.textContent       = fpSwapMode ? '✓ 완료' : '↔ 순서';
    btn.style.color       = fpSwapMode ? 'var(--accent)' : '';
    btn.style.borderColor = fpSwapMode ? 'var(--accent)' : '';
  }
  fpRenderAll();
}

// 테이블 클릭 — 일반 모드: 배정 모달 / 순서 변경 모드: 탭 2번으로 교환
function fpHandleTableClick(tid) {
  if (!fpSwapMode) { openAssignModal(tid); return; }

  const zone = fpGetZone(tid);
  if (!FP_SWAP_ZONES.has(zone)) return; // X존 변경 불가

  if (!fpSwapSrc) {                          // 첫 번째 선택
    fpSwapSrc = tid; fpRenderAll(); return;
  }
  if (fpSwapSrc === tid) {                   // 같은 테이블 재탭 → 취소
    fpSwapSrc = null; fpRenderAll(); return;
  }
  if (fpGetZone(fpSwapSrc) !== zone) {       // 다른 존 → 새로 선택
    fpSwapSrc = tid; fpRenderAll(); return;
  }

  // 같은 존 → 위치(x,y,w,h) 교환
  const i1 = fpRuntimeDefs.findIndex(d => d.id === fpSwapSrc);
  const i2 = fpRuntimeDefs.findIndex(d => d.id === tid);
  const {x:x1,y:y1,w:w1,h:h1} = fpRuntimeDefs[i1];
  const {x:x2,y:y2,w:w2,h:h2} = fpRuntimeDefs[i2];
  fpRuntimeDefs[i1] = {...fpRuntimeDefs[i1], x:x2, y:y2, w:w2, h:h2};
  fpRuntimeDefs[i2] = {...fpRuntimeDefs[i2], x:x1, y:y1, w:w1, h:h1};
  fpSwapSrc = null;
  fpSaveDefs();
  fpRenderAll();
}

// SVG 테이블 전체 렌더
function fpRenderAll() {
  const g = document.getElementById('fp-tables');
  if (!g || !fpRuntimeDefs) return;
  g.innerHTML = fpRuntimeDefs.map(t => {
    const asgn   = fpTableAssignments[t.id];
    const isSel  = fpSwapMode && fpSwapSrc === t.id;
    const fill   = asgn ? '#c9a96e' : (t.cap === 4 ? '#e07a4a' : '#2e8a78');
    const cx     = t.x + t.w / 2;
    const cy     = t.y + t.h / 2;
    const selStr = isSel ? ` stroke="#c9a96e" stroke-width="3" stroke-dasharray="5,3"` : '';
    const cursor = (fpSwapMode && FP_SWAP_ZONES.has(fpGetZone(t.id))) ? 'crosshair' : 'pointer';
    let inner;
    if (asgn) {
      const nameShort = asgn.name && asgn.name.length > 5 ? asgn.name.slice(0,5)+'…' : (asgn.name||'');
      if (t.cap === 4) {
        inner =
          `<text x="${cx}" y="${cy-10}" text-anchor="middle" fill="#0e0e0e" font-size="11" font-weight="700">${escH(asgn.time)}</text>` +
          `<text x="${cx}" y="${cy+4}"  text-anchor="middle" fill="#1a0800" font-size="9.5" font-weight="600">${escH(nameShort)}</text>` +
          `<text x="${cx}" y="${cy+17}" text-anchor="middle" fill="#2a1400" font-size="8">${asgn.people}명 · TABLE ${t.id}</text>`;
      } else {
        inner =
          `<text x="${cx}" y="${cy-6}" text-anchor="middle" fill="#0e0e0e" font-size="10" font-weight="700">${escH(asgn.time)}</text>` +
          `<text x="${cx}" y="${cy+7}" text-anchor="middle" fill="#1a0800" font-size="8.5">${escH(nameShort)} · ${asgn.people}명</text>`;
      }
    } else {
      const labelY = cy - 3;
      const idY    = t.cap === 4 ? cy + 13 : cy + 11;
      inner =
        `<text x="${cx}" y="${labelY}" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">${t.cap}인</text>` +
        `<text x="${cx}" y="${idY}"    text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">TABLE ${t.id}</text>`;
    }
    return `<g onclick="fpHandleTableClick('${t.id}')" style="cursor:${cursor}">` +
           `<rect x="${t.x}" y="${t.y}" width="${t.w}" height="${t.h}" rx="6" fill="${fill}" filter="url(#fpsh)"${selStr}/>` +
           inner + `</g>`;
  }).join('');
}

// ── 배정 모달 ──
function openAssignModal(tid) {
  fpAssignModalTable = tid;
  const info  = FLOOR_TABLES[tid];
  const asgn  = fpTableAssignments[tid];
  const capLabel = info.cap + '인석';

  document.getElementById('assignModalTitle').textContent = `TABLE ${tid} (${capLabel}) — 예약 배정`;
  document.getElementById('assignModalSub').textContent =
    fpCurrentDate
      ? fpCurrentDate.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1년 $2월 $3일')
      : '';

  document.getElementById('btnAssignUnset').classList.toggle('show', !!asgn);

  const dayRes = getResList()
    .filter(r => r.date === fpCurrentDate)
    .sort((a,b) => a.time.localeCompare(b.time));

  const list = document.getElementById('assignResList');
  if (!dayRes.length) {
    list.innerHTML = '<div class="assign-empty">이 날 등록된 예약이 없습니다.</div>';
  } else {
    list.innerHTML = dayRes.map(r => {
      const isCur = asgn && asgn.resId === r.id;
      return `<div class="assign-res-item${isCur?' cur':''}"
                   onclick="fpAssignTo('${r.id}','${r.time}','${escH(r.name)}',${r.people})">
        <div class="assign-res-time">${r.time}</div>
        <div class="assign-res-name">${escH(r.name)}</div>
        <div class="assign-res-ppl">${r.people}명</div>
        ${isCur ? '<div class="assign-res-check">✓</div>' : ''}
      </div>`;
    }).join('');
  }

  document.getElementById('assignModalBg').classList.add('open');
}

function closeAssignModal() {
  document.getElementById('assignModalBg').classList.remove('open');
  fpAssignModalTable = null;
}

async function fpAssignTo(resId, time, name, people) {
  if (!fpAssignModalTable || !fpCurrentDate) return;
  try {
    await db.ref('tableAssignments/'+fpCurrentDate+'/'+fpAssignModalTable)
            .set({ resId, time, name, people });
  } catch(e) { alert('저장 중 오류가 발생했습니다.'); }
  closeAssignModal();
}

async function unassignTable() {
  if (!fpAssignModalTable || !fpCurrentDate) return;
  try {
    await db.ref('tableAssignments/'+fpCurrentDate+'/'+fpAssignModalTable).remove();
  } catch(e) { alert('오류가 발생했습니다.'); }
  closeAssignModal();
}
</script>
