<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메뉴 관리 · Mokko Izakaya</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0e0e0e; --surface: #161616; --surface2: #1e1e1e;
      --border: #2a2a2a; --text: #e8e3db; --muted: #7a7068;
      --accent: #c9a96e; --red: #e05a5a; --green: #4caf82;
      --font: 'Segoe UI', 'Noto Sans KR', sans-serif;
    }
    body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }
    a { color: inherit; text-decoration: none; }

    /* ── PIN SCREEN ── */
    #pin-screen {
      position: fixed; inset: 0; z-index: 999;
      background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
    }
    #pin-screen h1 { font-size: 1.2rem; letter-spacing: 0.15em; color: var(--accent); }
    #pin-screen p { font-size: 0.8rem; color: var(--muted); }
    #pin-input {
      width: 180px; height: 48px; text-align: center;
      font-size: 1.4rem; letter-spacing: 0.3em;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); font-family: var(--font);
    }
    #pin-input:focus { outline: none; border-color: var(--accent); }
    #pin-error { color: var(--red); font-size: 0.8rem; display: none; }

    /* ── LAYOUT ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
      position: sticky; top: 0; z-index: 100;
    }
    header h1 { font-size: 0.95rem; letter-spacing: 0.1em; color: var(--accent); flex: 1; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 5px; font-size: 0.8rem; font-family: var(--font); cursor: pointer; border: none; letter-spacing: 0.04em; transition: opacity 0.2s; }
    .btn:hover { opacity: 0.8; }
    .btn-accent { background: var(--accent); color: #0e0e0e; font-weight: 600; }
    .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
    .btn-red { background: transparent; color: var(--red); border: 1px solid rgba(224,90,90,0.4); }
    .btn-green { background: var(--green); color: #fff; font-weight: 600; }
    .btn-sm { padding: 5px 10px; font-size: 0.75rem; }

    /* ── CATEGORY TABS ── */
    .cat-tabs {
      display: flex; overflow-x: auto; gap: 4px; padding: 12px 20px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      scrollbar-width: none;
    }
    .cat-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      white-space: nowrap; padding: 7px 14px; border-radius: 20px;
      font-size: 0.78rem; cursor: pointer; border: 1px solid var(--border);
      color: var(--muted); background: transparent; font-family: var(--font);
      transition: all 0.2s;
    }
    .cat-tab.active { background: var(--accent); color: #0e0e0e; border-color: var(--accent); font-weight: 600; }
    .cat-tab:hover:not(.active) { color: var(--text); border-color: var(--muted); }

    /* ── MAIN CONTENT ── */
    main { flex: 1; padding: 20px; max-width: 900px; width: 100%; margin: 0 auto; }

    .cat-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .cat-header h2 { font-size: 1rem; font-weight: 500; }
    .cat-header span { font-size: 0.75rem; color: var(--muted); }

    /* ── ITEM CARDS ── */
    .item-list { display: flex; flex-direction: column; gap: 8px; }
    .item-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 14px 16px; display: flex; align-items: center; gap: 12px;
    }
    .item-card.inactive { opacity: 0.45; }
    .item-info { flex: 1; min-width: 0; }
    .item-name-ko { font-size: 0.92rem; font-weight: 500; }
    .item-name-de { font-size: 0.78rem; color: var(--muted); margin-top: 1px; }
    .item-allergens { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
    .allergen-badge {
      display: inline-block; padding: 1px 6px; border-radius: 3px;
      font-size: 0.68rem; font-weight: 600; letter-spacing: 0.05em;
      background: rgba(201,169,110,0.15); color: var(--accent); border: 1px solid rgba(201,169,110,0.3);
    }
    .item-price { font-size: 0.95rem; font-weight: 500; color: var(--accent); white-space: nowrap; }
    .item-actions { display: flex; gap: 6px; }

    .empty-state {
      text-align: center; padding: 40px 20px; color: var(--muted);
      border: 1px dashed var(--border); border-radius: 8px;
    }

    /* ── MODAL ── */
    .modal-bg {
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 100%; max-width: 620px;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-header h3 { font-size: 0.95rem; }
    .modal-body { padding: 20px; }
    .modal-footer {
      padding: 16px 20px; border-top: 1px solid var(--border);
      display: flex; justify-content: flex-end; gap: 8px;
    }
    .close-btn { background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer; padding: 4px; }
    .close-btn:hover { color: var(--text); }

    /* ── FORM ── */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .form-single { margin-bottom: 16px; }
    .field-label {
      display: block; font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 6px;
    }
    .field-label span { color: var(--accent); margin-left: 2px; }
    input[type="text"], input[type="number"], textarea, select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-family: var(--font);
      font-size: 0.85rem; padding: 8px 10px; transition: border-color 0.2s;
    }
    input:focus, textarea:focus, select:focus { outline: none; border-color: var(--accent); }
    textarea { resize: vertical; min-height: 60px; line-height: 1.5; }
    input::placeholder, textarea::placeholder { color: var(--muted); }
    .section-divider { font-size: 0.72rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin: 20px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }

    /* ── ALLERGEN CHECKBOXES ── */
    .allergen-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
    .allergen-check { display: flex; flex-direction: column; align-items: center; gap: 3px; }
    .allergen-check input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); }
    .allergen-check label { font-size: 0.65rem; color: var(--muted); cursor: pointer; text-align: center; }
    .allergen-check .a-id { font-size: 0.75rem; font-weight: 700; color: var(--accent); }

    /* ── TOGGLE ── */
    .toggle-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .toggle { position: relative; width: 42px; height: 24px; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0; background: var(--border); border-radius: 24px; cursor: pointer;
      transition: 0.2s;
    }
    .toggle-slider::before {
      content: ''; position: absolute; height: 18px; width: 18px;
      left: 3px; bottom: 3px; background: var(--muted); border-radius: 50%; transition: 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(18px); background: #fff; }
    .toggle-label { font-size: 0.82rem; }

    /* ── PRINT STYLES ── */
    @media print {
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
      body { background: #fff !important; color: #1a1a1a !important; font-size: 9pt; margin: 0; padding: 0; }
      #pin-screen, #app > header, .cat-tabs, main { display: none !important; }
      #print-view { display: block !important; position: static !important; overflow: visible !important; }
      .print-toolbar { display: none !important; }
      .print-pages { padding: 0 !important; background: #fff !important; }
      .print-page { box-shadow: none !important; margin: 0 !important; page-break-after: always; }
      .print-page:last-child { page-break-after: auto; }
    }

    /* ── PRINT VIEW ── */
    #print-view {
      display: none;
      position: fixed; inset: 0; z-index: 800;
      background: #f0ede8; color: #1a1a1a;
      overflow-y: auto; padding: 0;
    }
    .print-toolbar {
      background: #1a1a1a; border-bottom: 2px solid #c9a96e;
      padding: 10px 20px; display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
    }
    .print-toolbar span { flex: 1; font-size: 0.8rem; color: #888; }
    .print-pages { padding: 30px 20px; background: #f0ede8; }

    /* 브라우저 기본 인쇄 여백을 제거해 A4 페이지 크기와 어긋나지 않게 함 (안 하면 첫 장이 빈 페이지로 밀려나옴) */
    @page { size: A4; margin: 0; }

    /* ── A4 PAGE ── */
    .print-page {
      width: 210mm; min-height: 297mm; margin: 0 auto 30px;
      background: #fff; color: #1a1a1a;
      padding: 14mm 16mm 14mm 16mm;
      box-shadow: 0 4px 30px rgba(0,0,0,0.2);
      font-family: 'Georgia', 'Times New Roman', serif;
      position: relative;
      box-sizing: border-box;
    }

    /* 페이지 외곽 장식 테두리 */
    .print-page::before {
      content: '';
      position: absolute;
      inset: 6mm;
      border: 0.4pt solid #c9a96e;
      pointer-events: none;
    }

    /* ── 헤더 ── */
    .print-header {
      text-align: center;
      padding-bottom: 5mm;
      margin-bottom: 5mm;
      border-bottom: 1pt solid #1a1a1a;
      position: relative;
    }
    .print-header::after {
      content: '— ✦ —';
      display: block;
      font-size: 7pt;
      color: #c9a96e;
      letter-spacing: 0.3em;
      margin-top: 2.5mm;
    }
    .print-brand-main {
      font-size: 20pt; font-weight: 700; letter-spacing: 0.18em;
      text-transform: uppercase; color: #1a1a1a;
      font-family: 'Georgia', serif;
    }
    .print-brand-sub {
      font-size: 7.5pt; letter-spacing: 0.25em; color: #888;
      text-transform: uppercase; margin-top: 1mm;
      font-family: 'Arial', sans-serif;
    }
    .print-address {
      font-size: 6.5pt; color: #aaa; margin-top: 1.5mm;
      font-family: 'Arial', sans-serif; letter-spacing: 0.05em;
    }

    /* ── SECTION ── */
    .print-section {
      margin-top: 4.5mm;
    }
    .print-section-title {
      font-size: 7.5pt; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase;
      color: #fff; background: #1a1a1a;
      padding: 1.5mm 3mm;
      margin-bottom: 2.5mm;
      font-family: 'Arial', sans-serif;
      display: flex; align-items: center; gap: 2mm;
    }
    .print-section-title::before {
      content: '◆';
      color: #c9a96e;
      font-size: 5pt;
    }
    .print-note {
      font-size: 6pt; color: #888; font-style: italic;
      margin-bottom: 2mm; margin-left: 1mm;
      font-family: 'Arial', sans-serif;
    }

    /* ── 2단 그리드 ── */
    .print-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 7mm;
    }
    .print-col { }

    /* ── ITEM ── */
    .print-item {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 1.8mm 0; border-bottom: 0.3pt solid #ebebeb; gap: 3mm;
    }
    .print-item:last-child { border-bottom: none; }
    .print-item-info { flex: 1; min-width: 0; }
    .print-item-name {
      font-size: 8pt; font-weight: 700; line-height: 1.3;
      font-family: 'Arial', sans-serif; color: #1a1a1a;
    }
    .print-item-desc {
      font-size: 6pt; color: #777; line-height: 1.35; margin-top: 0.4mm;
      font-family: 'Arial', sans-serif; font-style: italic;
    }
    .print-item-allergens {
      font-size: 5.5pt; color: #c9a96e; font-weight: 700; margin-top: 0.3mm;
      font-family: 'Arial', sans-serif; letter-spacing: 0.05em;
    }
    .print-item-price {
      font-size: 8pt; font-weight: 700; white-space: nowrap;
      color: #1a1a1a; font-family: 'Arial', sans-serif;
      padding-top: 0.5mm;
    }

    /* ── 알러지 범례 ── */
    .print-allergen-legend {
      margin-top: 5mm; padding: 2.5mm 3mm;
      border: 0.3pt solid #ddd; background: #fafafa;
      font-size: 5.5pt; color: #888; line-height: 2;
      font-family: 'Arial', sans-serif;
    }
    .print-allergen-legend strong { color: #c9a96e; margin-right: 1mm; }
    .print-allergen-label { color: #555; }

    /* ── 음료 페이지 헤더 ── */
    .print-bev-header {
      text-align: center;
      padding-bottom: 4mm; margin-bottom: 4mm;
      border-bottom: 1pt solid #1a1a1a;
    }
    .print-bev-header::after {
      content: '— ✦ —';
      display: block; font-size: 7pt; color: #c9a96e;
      letter-spacing: 0.3em; margin-top: 2mm;
    }

    .print-page-break { page-break-after: always; }

    /* ── 한글 인쇄 최적화 (라틴 서체는 한글을 지원하지 않아 브라우저마다 다르게 보임 → Noto 폰트로 고정) ── */
    .print-page.lang-ko { font-family: 'Noto Serif KR', serif; }
    .print-page.lang-ko .print-brand-main { font-family: 'Noto Serif KR', serif; letter-spacing: 0.08em; }
    .print-page.lang-ko .print-brand-sub,
    .print-page.lang-ko .print-address,
    .print-page.lang-ko .print-section-title,
    .print-page.lang-ko .print-note,
    .print-page.lang-ko .print-item-name,
    .print-page.lang-ko .print-item-desc,
    .print-page.lang-ko .print-item-allergens,
    .print-page.lang-ko .print-item-price,
    .print-page.lang-ko .print-allergen-legend { font-family: 'Noto Sans KR', sans-serif; }
    .print-page.lang-ko .print-section-title { letter-spacing: 0.04em; }
    .print-page.lang-ko .print-brand-sub { letter-spacing: 0.12em; }
    .print-page.lang-ko .print-item-desc { font-style: normal; }

    /* ── TOAST ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 10px 20px; font-size: 0.82rem; z-index: 999;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #toast.show { opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error { border-color: var(--red); color: var(--red); }

    /* ── LOADING ── */
    .loading { text-align: center; padding: 40px; color: var(--muted); }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div id="pin-screen">
  <h1>🔒 MOKKO 메뉴 관리</h1>
  <p>PIN 번호를 입력하세요</p>
  <input type="password" id="pin-input" maxlength="4" placeholder="• • • •" autocomplete="off" />
  <p id="pin-error">PIN이 올바르지 않습니다</p>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>🍽 Mokko 메뉴 관리</h1>
    <button class="btn btn-green" onclick="openPrintView()">🖨 인쇄 미리보기</button>
    <button class="btn btn-outline btn-sm" id="seed-btn" onclick="openSeedModal()" title="Firebase가 비어있을 때만 사용 가능" disabled style="opacity:0.4;cursor:not-allowed">⬇ 초기 로드</button>
    <button class="btn btn-outline btn-sm" onclick="doLogout()">로그아웃</button>
  </header>

  <div class="cat-tabs" id="cat-tabs"></div>

  <main id="main-content">
    <div class="loading">불러오는 중...</div>
  </main>
</div>

<!-- ITEM EDIT MODAL -->
<div id="edit-modal" class="modal-bg" style="display:none;">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">메뉴 항목 추가</h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="section-divider">이름</div>
      <div class="form-grid">
        <div>
          <label class="field-label">한국어 <span>*</span></label>
          <input type="text" id="f-name-ko" placeholder="예: 에다마메" />
        </div>
        <div>
          <label class="field-label">독일어 <span>*</span></label>
          <input type="text" id="f-name-de" placeholder="예: Edamame" />
        </div>
        <div>
          <label class="field-label">영어 <span>*</span></label>
          <input type="text" id="f-name-en" placeholder="예: Edamame" />
        </div>
      </div>

      <div class="section-divider">설명 (선택)</div>
      <div class="form-grid">
        <div>
          <label class="field-label">한국어</label>
          <textarea id="f-desc-ko" placeholder="재료, 조리법 등"></textarea>
        </div>
        <div>
          <label class="field-label">독일어</label>
          <textarea id="f-desc-de" placeholder="Zutaten, Zubereitung..."></textarea>
        </div>
        <div>
          <label class="field-label">영어</label>
          <textarea id="f-desc-en" placeholder="Ingredients, preparation..."></textarea>
        </div>
      </div>

      <div class="section-divider">가격 & 상태</div>
      <div class="form-grid-2">
        <div>
          <label class="field-label">가격 (€) <span>*</span></label>
          <input type="number" id="f-price" step="0.10" min="0" placeholder="0.00" />
        </div>
        <div>
          <label class="field-label">표시 순서</label>
          <input type="number" id="f-order" min="1" placeholder="숫자가 작을수록 위" />
        </div>
      </div>
      <div class="toggle-row">
        <label class="toggle">
          <input type="checkbox" id="f-active" checked />
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label">메뉴에 표시 (비활성화하면 숨김)</span>
      </div>

      <div class="section-divider">EU 알러지 정보 (해당하는 항목 체크)</div>
      <div class="allergen-grid" id="allergen-checks"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">취소</button>
      <button class="btn btn-accent" onclick="saveItem()">저장</button>
    </div>
  </div>
</div>

<!-- SEED MODAL -->
<div id="seed-modal" class="modal-bg" style="display:none;">
  <div class="modal-box" style="max-width:400px;">
    <div class="modal-header">
      <h3>초기 데이터 불러오기</h3>
      <button class="close-btn" onclick="document.getElementById('seed-modal').style.display='none'">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:0.85rem;line-height:1.7;color:var(--muted);">
        PDF 메뉴 기반으로 초기 데이터를 Firebase에 로드합니다.<br><br>
        <strong style="color:var(--accent);">ℹ️ Firebase가 완전히 비어 있을 때만 사용 가능합니다.</strong><br>
        이후에는 항목 추가/수정/삭제로 관리하세요.
      </p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="document.getElementById('seed-modal').style.display='none'">취소</button>
      <button class="btn btn-accent" onclick="loadSeedData()">불러오기</button>
    </div>
  </div>
</div>

<!-- PRINT VIEW -->

//  STATE
// ─────────────────────────────────────────────
let currentCat = 'starters';
let menuData = {};
let editingKey = null;
let editingCat = null;

// ─────────────────────────────────────────────
//  PIN
// ─────────────────────────────────────────────
document.getElementById('pin-input').addEventListener('input', e => {
  if (e.target.value.length === 4) {
    if (e.target.value === PIN) {
      document.getElementById('pin-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      init();
    } else {
      document.getElementById('pin-error').style.display = 'block';
      e.target.value = '';
      setTimeout(() => document.getElementById('pin-error').style.display = 'none', 2000);
    }
  }
});

function doLogout() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  renderCatTabs();
  renderAllergenChecks();
  loadCategory(currentCat);
  // Firebase가 비어 있을 때만 초기 로드 버튼 활성화
  db.ref('menu').once('value', snap => {
    const btn = document.getElementById('seed-btn');
    if (!snap.exists()) {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor = 'pointer';
      btn.title = 'Firebase가 비어 있습니다. 초기 데이터를 로드하세요.';
    } else {
      btn.disabled = true;
      btn.style.opacity = '0.3';
      btn.title = '이미 데이터가 있습니다 (항목 추가/수정/삭제로 관리)';
    }
  });
}

function renderCatTabs() {
  const el = document.getElementById('cat-tabs');
  el.innerHTML = CATEGORIES.map(c => `
    <button class="cat-tab ${c.id === currentCat ? 'active' : ''}"
      onclick="switchCat('${c.id}')">${c.ko}</button>
  `).join('');
}

function switchCat(id) {
  currentCat = id;
  renderCatTabs();
  loadCategory(id);
}

function loadCategory(catId) {
  const main = document.getElementById('main-content');
  main.innerHTML = '<div class="loading">불러오는 중...</div>';
  db.ref(`menu/${catId}`).once('value', snap => {
    const data = snap.val() || {};
    menuData[catId] = data;
    renderCategory(catId, data);
  });
}

function renderCategory(catId, data) {
  const cat = CATEGORIES.find(c => c.id === catId);
  const items = Object.entries(data).sort((a,b) => (a[1].order||99) - (b[1].order||99));
  const main = document.getElementById('main-content');
  main.innerHTML = `
    <div class="cat-header">
      <div>
        <h2>${cat.ko} <span style="font-size:0.8rem;color:var(--muted);font-weight:400;">${cat.de}</span></h2>
        <span>${items.length}개 항목</span>
      </div>
      <button class="btn btn-accent" onclick="openAddModal('${catId}')">+ 항목 추가</button>
    </div>
    <div class="item-list">
      ${items.length === 0 ? '<div class="empty-state">아직 항목이 없습니다.<br>위 버튼으로 추가해보세요.</div>' :
        items.map(([key, item]) => renderItemCard(catId, key, item)).join('')}
    </div>
  `;
}

function renderItemCard(catId, key, item) {
  const allergenBadges = (item.allergens || []).map(a =>
    `<span class="allergen-badge">${a}</span>`).join('');
  return `
    <div class="item-card ${item.active === false ? 'inactive' : ''}">
      <div class="item-info">
        <div class="item-name-ko">${item.name_ko || ''} ${item.active === false ? '<span style="font-size:0.7rem;color:var(--muted)">(숨김)</span>' : ''}</div>
        <div class="item-name-de">${item.name_de || ''}</div>
        ${allergenBadges ? `<div class="item-allergens">${allergenBadges}</div>` : ''}
      </div>
      <div class="item-price">${item.price ? '€' + Number(item.price).toFixed(2) : ''}</div>
      <div class="item-actions">
        <button class="btn btn-outline btn-sm" onclick="openEditModal('${catId}','${key}')">수정</button>
        <button class="btn btn-red btn-sm" onclick="deleteItem('${catId}','${key}')">삭제</button>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  ALLERGEN CHECKBOXES
// ─────────────────────────────────────────────
function renderAllergenChecks() {
  document.getElementById('allergen-checks').innerHTML = ALLERGENS.map(a => `
    <div class="allergen-check">
      <input type="checkbox" id="al-${a.id}" value="${a.id}" />
      <span class="a-id">${a.id}</span>
      <label for="al-${a.id}">${a.ko}<br><span style="font-size:0.6rem">${a.de}</span></label>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────
function openAddModal(catId) {
  editingKey = null;
  editingCat = catId;
  document.getElementById('modal-title').textContent = '메뉴 항목 추가';
  clearForm();
  // Set default order = count + 1
  const count = Object.keys(menuData[catId] || {}).length;
  document.getElementById('f-order').value = count + 1;
  document.getElementById('edit-modal').style.display = 'flex';
}

function openEditModal(catId, key) {
  editingKey = key;
  editingCat = catId;
  const item = menuData[catId][key];
  document.getElementById('modal-title').textContent = '메뉴 항목 수정';
  document.getElementById('f-name-ko').value = item.name_ko || '';
  document.getElementById('f-name-de').value = item.name_de || '';
  document.getElementById('f-name-en').value = item.name_en || '';
  document.getElementById('f-desc-ko').value = item.desc_ko || '';
  document.getElementById('f-desc-de').value = item.desc_de || '';
  document.getElementById('f-desc-en').value = item.desc_en || '';
  document.getElementById('f-price').value = item.price || '';
  document.getElementById('f-order').value = item.order || '';
  document.getElementById('f-active').checked = item.active !== false;
  ALLERGENS.forEach(a => {
    document.getElementById(`al-${a.id}`).checked = (item.allergens || []).includes(a.id);
  });
  document.getElementById('edit-modal').style.display = 'flex';
}

function closeModal() {
  document.getElementById('edit-modal').style.display = 'none';
}

function clearForm() {
  ['f-name-ko','f-name-de','f-name-en','f-desc-ko','f-desc-de','f-desc-en','f-price','f-order']
    .forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-active').checked = true;
  ALLERGENS.forEach(a => document.getElementById(`al-${a.id}`).checked = false);
}

function saveItem() {
  const nameKo = document.getElementById('f-name-ko').value.trim();
  const nameDe = document.getElementById('f-name-de').value.trim();
  const nameEn = document.getElementById('f-name-en').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  if (!nameKo || !nameDe || !nameEn) { showToast('이름을 모두 입력해주세요', 'error'); return; }
  if (isNaN(price)) { showToast('가격을 입력해주세요', 'error'); return; }
  const allergens = ALLERGENS.filter(a => document.getElementById(`al-${a.id}`).checked).map(a => a.id);
  const item = {
    name_ko: nameKo, name_de: nameDe, name_en: nameEn,
    desc_ko: document.getElementById('f-desc-ko').value.trim(),
    desc_de: document.getElementById('f-desc-de').value.trim(),
    desc_en: document.getElementById('f-desc-en').value.trim(),
    price: price,
    order: parseInt(document.getElementById('f-order').value) || 99,
    active: document.getElementById('f-active').checked,
    allergens: allergens,
    updatedAt: new Date().toISOString(),
  };
  const ref = editingKey
    ? db.ref(`menu/${editingCat}/${editingKey}`)
    : db.ref(`menu/${editingCat}`).push();
  ref.set(item).then(() => {
    showToast('저장되었습니다 ✓', 'success');
    closeModal();
    loadCategory(editingCat);
  }).catch(e => showToast('오류: ' + e.message, 'error'));
}

function deleteItem(catId, key) {
  const item = menuData[catId][key];
  if (!confirm(`"${item.name_ko}" 을(를) 삭제하시겠습니까?`)) return;
  db.ref(`menu/${catId}/${key}`).remove().then(() => {
    showToast('삭제되었습니다', 'success');
    loadCategory(catId);
  }).catch(e => showToast('오류: ' + e.message, 'error'));
}

// ─────────────────────────────────────────────
//  SEED DATA
// ─────────────────────────────────────────────
function openSeedModal() {
  document.getElementById('seed-modal').style.display = 'flex';
}

async function loadSeedData() {
  document.getElementById('seed-modal').style.display = 'none';
  showToast('데이터 확인 중...', 'success');
  try {
    // 기존 데이터 존재 여부 재확인
    const snap = await db.ref('menu').once('value');
    if (snap.exists()) {
      showToast('이미 데이터가 있습니다. 초기 로드 불가.', 'error');
      return;
    }
    showToast('초기 데이터 로딩 중...', 'success');
    for (const [cat, items] of Object.entries(SEED)) {
      for (const item of items) {
        await db.ref(`menu/${cat}`).push({...item, updatedAt: new Date().toISOString()});
      }
    }
    showToast('초기 데이터 로드 완료! ✓', 'success');
    document.getElementById('seed-btn').disabled = true;
    document.getElementById('seed-btn').style.opacity = '0.4';
    loadCategory(currentCat);
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
  }
}

async function openPrintView() {
  showToast('데이터 불러오는 중...', 'success');
  // Load all categories
  const snap = await db.ref('menu').once('value');
  const allData = snap.val() || {};

  window._printData = allData;
  document.getElementById('print-view').style.display = 'block';
  renderPrint();

function renderPrint() {
  const lang = document.getElementById('print-lang').value;
  const allData = window._printData || {};
  const today = new Date().toLocaleDateString('de-DE', {year:'numeric',month:'long',day:'numeric'});

  // 한 페이지에 다 안 들어가서 두 장으로 나눔 (안 나누면 브라우저가 강제로 다음 장에
  // 헤더·테두리 없이 이어붙여 인쇄가 지저분해짐)
  const foodCatsPage1 = ['starters','fried','chefs','sashimi'];
  const foodCatsPage2 = ['grill','tofu','hotpot','extras'];
  const catLabels = {
    de: {starters:'Vorspeisen',fried:'Frittiertes',chefs:"Chef's Spezialitäten",sashimi:'Sashimi',grill:'Vom Grill',tofu:'Tofu Suppe',hotpot:'Eintopf',extras:'Beilagen',beverages:'Getränke',lunch:'Mittagsmenü'},
    en: {starters:'Starters',fried:'Fried',chefs:"Chef's Specials",sashimi:'Sashimi',grill:'From the Grill',tofu:'Tofu Stew',hotpot:'Hotpot',extras:'Sides',beverages:'Beverages',lunch:'Lunch'},
    ko: {starters:'전채',fried:'튀김',chefs:'셰프 특선',sashimi:'사시미',grill:'그릴',tofu:'순두부',hotpot:'전골',extras:'사이드',beverages:'음료',lunch:'점심'}
  };

  // 알러지 범례 HTML
  const allergenLegend = ALLERGENS.map(a =>
    `<span><strong>${a.id}</strong> <span class="print-allergen-label">${lang==='ko'?a.ko:a.de}</span></span>`
  ).join(' &thinsp;·&thinsp; ');

  // 아이템 HTML (단일 아이템)
  function itemHtml(item) {
    const nameKey = `name_${lang}`;
    const descKey = `desc_${lang}`;
    const al = (item.allergens||[]).join(' ');
    return `<div class="print-item">
      <div class="print-item-info">
        <div class="print-item-name">${item[nameKey]||item.name_de||''}</div>
        ${item[descKey] ? `<div class="print-item-desc">${(item[descKey]||'').replace(/\n/g,'<br>')}</div>` : ''}

      </div>
      <div class="print-item-price">${item.price ? '€ '+Number(item.price).toFixed(2) : ''}</div>
    </div>`;
  }

  // 카테고리 → 2단 섹션 HTML
  function sectionHtml(catId, note) {
    const items = Object.values(allData[catId] || {})
      .filter(i => i.active !== false)
      .sort((a,b) => (a.order||99)-(b.order||99));
    if (!items.length) return '';
    const half = Math.ceil(items.length / 2);
    const col1 = items.slice(0, half).map(itemHtml).join('');
    const col2 = items.slice(half).map(itemHtml).join('');
    const label = catLabels[lang][catId] || catId;
    return `
      <div class="print-section">
        <div class="print-section-title">${label}</div>
        ${note ? `<div class="print-note">${note}</div>` : ''}

          <div class="print-col">${col2}</div>
        </div>
      </div>`;
  }

  // ── PAGE 1: 푸드 메뉴 ──
  const hotpotNote = lang==='de'
    ? 'Für 2–3 Personen. Am Tisch mit Gasbrenner zubereitet.'
    : lang==='en' ? 'For 2–3 persons. Cooked at your table with a gas burner.'
    : '2~3인 이상, 테이블 가스버너 제공';

  let foodHtml1 = foodCatsPage1.map(c => sectionHtml(c, null)).join('');
  let foodHtml2 = foodCatsPage2.map(c => sectionHtml(c, c==='hotpot'?hotpotNote:null)).join('');

  // 점심 섹션 (1단)
  const lunchItems = Object.values(allData['lunch']||{}).filter(i=>i.active!==false).sort((a,b)=>(a.order||99)-(b.order||99));
  const lunchHtml = lunchItems.length ? `
    <div class="print-section">
      <div class="print-section-title">${catLabels[lang]['lunch']}</div>
      <div class="print-cols">
        <div class="print-col">${lunchItems.map(itemHtml).join('')}</div>
        <div class="print-col"></div>

    </div>` : '';

  const allergenFooter = (title, note) => `
    <div class="print-allergen-legend">
      <strong>${title}</strong>&ensp;${allergenLegend}<br>
      <span style="font-style:italic;">${note}</span>
    </div>`;

  // ── PAGE 2: 음료 메뉴 ──
  const bevItems = Object.values(allData['beverages']||{}).filter(i=>i.active!==false).sort((a,b)=>(a.order||99)-(b.order||99));
  const bevHalf = Math.ceil(bevItems.length / 2);
  const bevCol1 = bevItems.slice(0, bevHalf).map(itemHtml).join('');
  const bevCol2 = bevItems.slice(bevHalf).map(itemHtml).join('');

      </div>`;
  const foodFooter = allergenFooter(
    lang==='de'?'Allergene:':lang==='en'?'Allergens:':'알러지 정보:',
    lang==='de'?'Allergene auf Anfrage beim Personal erhältlich.':lang==='en'?'Please ask our staff for allergen information.':'알러지 정보는 직원에게 문의해 주세요.'
  );

  const pages = `
    <div class="print-page ${lang==='ko'?'lang-ko':''}">
      ${foodHeader}
      ${foodHtml1}

    <div class="print-page ${lang==='ko'?'lang-ko':''}">
      ${foodHeader}
      ${foodHtml2}
      ${lunchHtml}
      ${foodFooter}

    <div class="print-page ${lang==='ko'?'lang-ko':''}">
      <div class="print-bev-header">
        <div class="print-brand-main">Mokko Izakaya</div>
        <div class="print-brand-sub">${lang==='de'?'Getränkekarte':lang==='en'?'Drinks Menu':'음료 메뉴'}</div>
        <div class="print-address">Marktplatz 44 &nbsp;·&nbsp; 65824 Schwalbach am Taunus</div>
      </div>
      ${bevItems.length ? `
        <div class="print-section">
          <div class="print-section-title">${bevLabel}</div>
          <div class="print-cols">
            <div class="print-col">${bevCol1}</div>
            <div class="print-col">${bevCol2}</div>
          </div>
        </div>` : ''}
      ${allergenFooter(
        lang==='de'?'Allergene:':lang==='en'?'Allergens:':'알러지 정보:',
        lang==='de'?'Allergene auf Anfrage beim Personal erhältlich.':lang==='en'?'Please ask our staff for allergen information.':'알러지 정보는 직원에게 문의해 주세요.'
      )}
    </div>
  `;
  document.getElementById('print-pages').innerHTML = pages;
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
function showToast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2500);
}
</script>
