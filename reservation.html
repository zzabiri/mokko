<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>저녁 예약 · Mokko Izakaya</title>
  <meta name="description" content="Mokko Izakaya 저녁 예약 — Marktplatz 44, Schwalbach am Taunus" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=Noto+Serif+JP:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e3db;
      --muted:   #7a7068;
      --accent:  #c9a96e;
      --green:   #4caf82;
      --red:     #e05a5a;
      --font-sans:  'Noto Sans KR', sans-serif;
      --font-serif: 'Noto Serif JP', serif;
      --ease:    0.22s ease;
      --tap:     52px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 680px;
      margin: 0 auto;
      padding: 0 20px;
      height: 54px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .nav-back {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      transition: color var(--ease);
    }
    .nav-back:hover { color: var(--text); }
    .nav-logo {
      font-family: var(--font-serif);
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      color: var(--accent);
    }
    .nav-lang {
      margin-left: auto;
      display: flex;
      gap: 4px;
    }
    .lang-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      padding: 3px 7px;
      cursor: pointer;
      transition: color var(--ease), border-color var(--ease);
    }
    .lang-btn:hover { color: var(--text); border-color: var(--muted); }
    .lang-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ── LAYOUT ── */
    .page-wrap {
      max-width: 680px;
      margin: 0 auto;
      padding: 80px 20px 60px;
    }

    /* ── HEADER ── */
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    .page-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .page-title {
      font-family: var(--font-serif);
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }
    .page-subtitle {
      font-size: 0.82rem;
      color: var(--muted);
      line-height: 1.7;
    }

    /* ── FORM ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 28px 24px;
      margin-bottom: 16px;
    }
    .form-section-title {
      font-family: var(--font-serif);
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .field-group {
      margin-bottom: 20px;
    }
    .field-group:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .required-mark { color: var(--accent); margin-left: 2px; }

    input, select {
      width: 100%;
      height: var(--tap);
      padding: 0 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.92rem;
      font-weight: 300;
      transition: border-color var(--ease);
      -webkit-appearance: none;
      appearance: none;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }
    input::placeholder { color: var(--muted); }
    select { cursor: pointer; }
    select option { background: #1a1a1a; }

    /* 셀렉트 화살표 */
    .select-wrap {
      position: relative;
    }
    .select-wrap::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.8rem;
    }

    /* 날짜+시간 2열 */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── 확인 버튼 ── */
    .btn-check {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 54px;
      background: var(--accent);
      color: #0e0e0e;
      font-family: var(--font-sans);
      font-size: 0.86rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background var(--ease), opacity var(--ease);
      margin-top: 8px;
    }
    .btn-check:hover { background: #dbb97e; }
    .btn-check:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── 결과 패널 ── */
    #result-panel {
      display: none;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }

    .result-card {
      border-radius: 8px;
      padding: 28px 24px;
      border: 1px solid;
    }
    .result-card.available {
      background: rgba(76,175,130,0.07);
      border-color: rgba(76,175,130,0.35);
    }
    .result-card.unavailable {
      background: rgba(224,90,90,0.07);
      border-color: rgba(224,90,90,0.3);
    }

    .result-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .result-title {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      font-weight: 300;
      margin-bottom: 8px;
    }
    .result-title.ok { color: var(--green); }
    .result-title.ng { color: var(--red); }
    .result-desc {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.75;
      margin-bottom: 24px;
    }

    /* 예약 요약 */
    .summary-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 0;
      border-bottom: 1px solid rgba(42,42,42,0.6);
      font-size: 0.85rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .s-label { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.04em; }
    .summary-row .s-value { font-weight: 400; }

    /* 예약 확정 버튼 */
    .btn-confirm {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 54px;
      background: var(--green);
      color: #fff;
      font-family: var(--font-sans);
      font-size: 0.86rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: opacity var(--ease);
    }
    .btn-confirm:hover { opacity: 0.85; }

    /* 문의 버튼들 */
    .contact-btns {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .btn-kakao {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      height: 60px;
      background: #FEE500;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity var(--ease);
    }
    .btn-kakao:hover { opacity: 0.88; }
    .kakao-ico {
      width: 36px; height: 36px;
      background: rgba(0,0,0,0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .kakao-label { text-align: left; }
    .kakao-label strong { display: block; font-size: 0.88rem; font-weight: 700; color: #3A1D1D; }
    .kakao-label span { font-size: 0.74rem; color: #5a3a3a; }

    .btn-tel {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 18px;
      height: 60px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color var(--ease);
    }
    .btn-tel:hover { border-color: var(--accent); }
    .tel-ico {
      width: 36px; height: 36px;
      background: var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .tel-label strong { display: block; font-size: 0.88rem; font-weight: 500; color: var(--text); }
    .tel-label span { font-size: 0.74rem; color: var(--muted); }

    .btn-reset {
      width: 100%;
      height: 44px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      font-family: var(--font-sans);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: var(--ease);
      margin-top: 12px;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* ── 예약 완료 ── */
    #done-panel {
      display: none;
      text-align: center;
      padding: 40px 20px;
      animation: slideIn 0.3s ease;
    }
    .done-icon { font-size: 3rem; margin-bottom: 16px; }
    .done-title {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--green);
      margin-bottom: 10px;
    }
    .done-sub {
      font-size: 0.84rem;
      color: var(--muted);
      line-height: 1.8;
      margin-bottom: 28px;
    }

    /* ── NOTE ── */
    .note-box {
      margin-top: 20px;
      padding: 16px 18px;
      background: var(--surface);
      border-left: 2px solid rgba(201,169,110,0.5);
      font-size: 0.76rem;
      color: var(--muted);
      line-height: 1.8;
      border-radius: 0 4px 4px 0;
    }
    .note-box strong { color: var(--text); font-weight: 500; }

    /* ── FOOTER ── */
    .page-footer {
      text-align: center;
      margin-top: 40px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* ── 에러 ── */
    .field-error {
      font-size: 0.72rem;
      color: var(--red);
      margin-top: 6px;
    }
    input.error, select.error {
      border-color: var(--red);
    }

    @media (min-width: 500px) {
      .page-wrap { padding: 90px 32px 60px; }
      .form-card { padding: 32px 32px; }
    }
  </style>
</head>

      </div>
    </div>

    <button class="btn-check" id="btnCheck" onclick="checkAvailability()">

    <div class="note-box">
      <strong data-i18n="note_title"></strong><br />
      <span data-i18n="note_text"></span>

  </div>

  <!-- 결과 패널 -->
  <div id="result-panel"></div>

  <!-- 완료 패널 -->
  <div id="done-panel">
    <div class="done-icon">✅</div>
    <div class="done-title" data-i18n="done_title"></div>
    <div class="done-sub" id="done-msg"></div>
    <button class="btn-reset" onclick="resetAll()" data-i18n="btn_reset"></button>

    <a href="tel:+4961965240786" style="color:var(--accent)">06196 5240786</a>

</div>

// ── 언어 상태 ──
let lang = 'ko';

function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;

  // data-i18n 텍스트 교체
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    const val = T[l][key];
    if (val !== undefined) el.textContent = val;
  });

  // placeholder 교체
  const fName  = document.getElementById('fName');
  const fPhone = document.getElementById('fPhone');
  if (fName)  fName.placeholder  = T[l].name_placeholder;
  if (fPhone) fPhone.placeholder = T[l].phone_placeholder;

  // 인원 select 재생성 (언어별 단위)
  const fPeople = document.getElementById('fPeople');
  if (fPeople) {
    const cur = fPeople.value;
    fPeople.innerHTML = `<option value="">${T[l].people_placeholder}</option>`;
    for (let i = 1; i <= 20; i++) {
      const suffix = i === 1 ? T[l].people_suffix_one : T[l].people_suffix_many;
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = i + suffix;
      fPeople.appendChild(opt);
    }
    if (cur) fPeople.value = cur;
  }

  // 시간 placeholder (날짜 미선택 상태일 때)
  const fTime = document.getElementById('fTime');
  if (fTime && fTime.options.length === 1 && !fTime.options[0].value) {
    fTime.options[0].textContent = T[l].time_placeholder;
  }

  // 언어 버튼 active 표시
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === l)
  );

  // page title
  document.title = {
    ko: '저녁 예약 · Mokko Izakaya',
    de: 'Abendreservierung · Mokko Izakaya',
    en: 'Dinner Reservation · Mokko Izakaya',
  }[l];
}

// 언어 버튼 이벤트
document.querySelectorAll('.lang-btn').forEach(b =>
  b.addEventListener('click', () => applyLang(b.dataset.lang))
);

// ── localStorage 헬퍼 ──
function getReservations() {
  try { return JSON.parse(localStorage.getItem('mokko_reservations') || '[]'); }
  catch { return []; }
}
function saveReservations(arr) {
  localStorage.setItem('mokko_reservations', JSON.stringify(arr));
}

// ── 날짜 입력 최소/최대값 설정 ──
(function initDate() {
  const today = new Date();
  const fmt = d => d.toISOString().slice(0, 10);
  const max = new Date(today); max.setDate(max.getDate() + 60);
  const fDate = document.getElementById('fDate');
  fDate.min = fmt(today);
  fDate.max = fmt(max);
})();

// ── 날짜 변경 → 시간 슬롯 업데이트 ──
document.getElementById('fDate').addEventListener('change', function () {
  const val = this.value;
  const fTime = document.getElementById('fTime');
  fTime.innerHTML = '';

  if (!val) {
    fTime.innerHTML = `<option value="">${T[lang].time_placeholder}</option>`;
    return;
  }

  const date = new Date(val + 'T00:00:00');
  const dow  = date.getDay();
  const slots = TIME_SLOTS[dow];

  if (!slots) {
    fTime.innerHTML = `<option value="">${T[lang].time_closed}</option>`;
    return;
  }

  const now = new Date();
  const isToday = val === now.toISOString().slice(0, 10);
  let hasSlot = false;

  slots.forEach(t => {
    if (isToday) {
      const [h, m] = t.split(':').map(Number);
      const slotMin = h * 60 + m;
      const nowMin  = now.getHours() * 60 + now.getMinutes();
      if (slotMin <= nowMin) return;
    }
    const opt = document.createElement('option');
    opt.value = t;
    opt.textContent = t;
    fTime.appendChild(opt);
    hasSlot = true;
  });

  if (!hasSlot) {
    fTime.innerHTML = `<option value="">${T[lang].time_done}</option>`;
  }

  clearErrors();
});

// ── 유효성 검사 ──
function validate() {
  let ok = true;
  const t = T[lang];
  const date   = document.getElementById('fDate').value;
  const time   = document.getElementById('fTime').value;
  const people = document.getElementById('fPeople').value;
  const name   = document.getElementById('fName').value.trim();
  const phone  = document.getElementById('fPhone').value.trim();

  clearErrors();

  if (!date) { showErr('err-date', t.err_date); ok = false; }
  else {
    const d = new Date(date + 'T00:00:00');
    if (!TIME_SLOTS[d.getDay()]) { showErr('err-date', t.err_sunday); ok = false; }
  }
  if (!time)   { showErr('err-time',   t.err_time);   ok = false; }
  if (!people) { showErr('err-people', t.err_people); ok = false; }
  if (!name)   { showErr('err-name',   t.err_name);   ok = false; }
  if (!phone)  { showErr('err-phone',  t.err_phone);  ok = false; }
  else if (!/^[\d\s\-\+\(\)]{6,20}$/.test(phone)) {
    showErr('err-phone', t.err_phone_invalid); ok = false;
  }

  return ok;
}
function showErr(id, msg) {
  const el = document.getElementById(id);
  if (el) el.textContent = msg;
}
function clearErrors() {
  ['err-date','err-time','err-people','err-name','err-phone'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });
}

// ── 날짜 표시 문자열 ──
function formatDateStr(dateVal) {
  const d   = new Date(dateVal + 'T00:00:00');
  const day = DAY_NAMES[lang][d.getDay()];
  if (lang === 'ko') return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${day})`;
  if (lang === 'de') return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()} (${day})`;
  return `${day}, ${d.toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}`;
}

// ── 예약 가능 여부 확인 ──
function checkAvailability() {
  if (!validate()) return;

  const t      = T[lang];
  const date   = document.getElementById('fDate').value;
  const time   = document.getElementById('fTime').value;
  const people = parseInt(document.getElementById('fPeople').value);
  const name   = document.getElementById('fName').value.trim();
  const phone  = document.getElementById('fPhone').value.trim();

  const reservations = getReservations();
  const booked = reservations
    .filter(r => r.date === date && r.time === time)
    .reduce((sum, r) => sum + r.people, 0);

  const remaining = MAX_CAPACITY - booked;
  const dateStr   = formatDateStr(date);

  const resultPanel = document.getElementById('result-panel');
  resultPanel.style.display = 'block';
  document.getElementById('form-section').style.display = 'none';

  if (people <= remaining) {
    resultPanel.innerHTML = `
      <div class="result-card available">
        <div class="result-icon">🎉</div>
        <div class="result-title ok">${t.avail_title}</div>
        <div class="result-desc">
          ${t.avail_desc_pre}<strong style="color:var(--green)">${remaining}${t.avail_desc_suf}</strong>
        </div>
        <div class="summary-box">
          <div class="summary-row"><span class="s-label">${t.s_date}</span><span class="s-value">${dateStr}</span></div>
          <div class="summary-row"><span class="s-label">${t.s_time}</span><span class="s-value">${time}</span></div>
          <div class="summary-row"><span class="s-label">${t.s_people}</span><span class="s-value">${people}${lang==='ko'?'명':lang==='de'?(people===1?' Person':' Personen'):' guest'+(people===1?'':'s')}</span></div>
          <div class="summary-row"><span class="s-label">${t.s_name}</span><span class="s-value">${escapeHtml(name)}</span></div>
          <div class="summary-row"><span class="s-label">${t.s_phone}</span><span class="s-value">${escapeHtml(phone)}</span></div>
        </div>
        <button class="btn-confirm" onclick="confirmReservation('${escapeAttr(date)}','${time}',${people},'${escapeAttr(name)}','${escapeAttr(phone)}','${escapeAttr(dateStr)}')">
          ${t.btn_confirm}
        </button>
        <button class="btn-reset" onclick="goBack()">${t.btn_back}</button>
      </div>`;
  } else {
    const msg = remaining <= 0
      ? t.unavail_full.replace('{date}', dateStr).replace('{time}', time)
      : t.unavail_partial.replace('{remaining}', remaining);

    resultPanel.innerHTML = `
      <div class="result-card unavailable">
        <div class="result-icon">😔</div>
        <div class="result-title ng">${t.unavail_title}</div>
        <div class="result-desc">${msg}<br />${t.unavail_contact}</div>
        <div class="contact-btns">
          <a href="${KAKAO_URL}" target="_blank" rel="noopener" class="btn-kakao">
            <div class="kakao-ico">💬</div>
            <div class="kakao-label">
              <strong>${t.kakao_title}</strong>
              <span>${t.kakao_sub}</span>
            </div>
          </a>
          <a href="${TEL_HREF}" class="btn-tel">
            <div class="tel-ico">📞</div>
            <div class="tel-label">
              <strong>${TEL}</strong>
              <span>${t.tel_sub}</span>
            </div>
          </a>
        </div>
        <button class="btn-reset" onclick="goBack()">${t.btn_other}</button>
      </div>`;
  }

  resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 예약 확정 ──
function confirmReservation(date, time, people, name, phone, dateStr) {
  const t = T[lang];
  const reservations = getReservations();

  const dup = reservations.find(r => r.phone === phone && r.date === date && r.time === time);
  if (dup) { alert(t.dup_alert); return; }

  reservations.push({ id: Date.now().toString(), date, time, people, name, phone, createdAt: new Date().toISOString() });
  saveReservations(reservations);

  document.getElementById('result-panel').style.display = 'none';
  const donePanel = document.getElementById('done-panel');
  donePanel.style.display = 'block';

  const peopleSuffix = lang==='ko' ? '명' : lang==='de' ? (people===1?' Person':' Personen') : (people===1?' guest':' guests');

  document.getElementById('done-msg').innerHTML = t.done_msg
    .replace('{name}',   escapeHtml(name))
    .replace('{date}',   dateStr)
    .replace('{time}',   time)
    .replace('{people}', people + peopleSuffix)
    .replace('{phone}',  escapeHtml(phone));

  donePanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── 뒤로 가기 ──
function goBack() {
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── 처음으로 ──
function resetAll() {
  document.getElementById('fDate').value = '';
  document.getElementById('fTime').innerHTML = `<option value="">${T[lang].time_placeholder}</option>`;
  document.getElementById('fPeople').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('done-panel').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  clearErrors();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── XSS 방지 ──
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escapeAttr(str) {
  return String(str).replace(/'/g,"\\'").replace(/\\/g,'\\\\');
}

// ── 초기화 ──
applyLang('ko');
</script>
