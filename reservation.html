<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0e0e0e;
      --surface: #161616;
      --border:  #2a2a2a;
      --text:    #e8e3db;
      --muted:   #7a7068;
      --accent:  #c9a96e;
      --green:   #4caf82;
      --red:     #e05a5a;
      --font-sans:  'Noto Sans KR', sans-serif;
      --font-serif: 'Noto Serif JP', serif;
      --ease:    0.22s ease;
      --tap:     52px;
    }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      min-height: 100svh;
    }
    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(14,14,14,0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 680px; margin: 0 auto;
      padding: 0 20px; height: 54px;
      display: flex; align-items: center; gap: 16px;
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      color: var(--muted); font-size: 0.8rem; letter-spacing: 0.05em;
      transition: color var(--ease);
    }
    .nav-back:hover { color: var(--text); }
    .nav-logo {
      font-family: var(--font-serif); font-size: 0.92rem;
      letter-spacing: 0.08em; color: var(--accent);
    }
    .nav-lang { margin-left: auto; display: flex; gap: 4px; }
    .lang-btn {
      background: none; border: 1px solid var(--border); border-radius: 3px;
      color: var(--muted); font-family: var(--font-sans);
      font-size: 0.68rem; letter-spacing: 0.04em; padding: 3px 7px;
      cursor: pointer; transition: color var(--ease), border-color var(--ease);
    }
    .lang-btn:hover { color: var(--text); border-color: var(--muted); }
    .lang-btn.active { color: var(--accent); border-color: var(--accent); }

    /* ── LAYOUT ── */
    .page-wrap { max-width: 680px; margin: 0 auto; padding: 80px 20px 60px; }

    /* ── HEADER ── */
    .page-header { text-align: center; margin-bottom: 28px; }
    .page-eyebrow {
      font-size: 0.68rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 10px;
    }
    .page-title {
      font-family: var(--font-serif); font-size: 1.8rem;
      font-weight: 300; letter-spacing: 0.04em; margin-bottom: 10px;
    }
    .page-subtitle { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }

    /* ── 섹션 토글 ── */
    .section-toggle {
      display: flex; border: 1px solid var(--border);
      border-radius: 6px; overflow: hidden; margin-bottom: 28px;
    }
    .toggle-btn {
      flex: 1; height: 48px; background: none; border: none;
      color: var(--muted); font-family: var(--font-sans);
      font-size: 0.84rem; font-weight: 400; letter-spacing: 0.04em;
      cursor: pointer; transition: background var(--ease), color var(--ease);
    }
    .toggle-btn + .toggle-btn { border-left: 1px solid var(--border); }
    .toggle-btn.active { background: var(--accent); color: #0e0e0e; font-weight: 500; }

    /* ── FORM ── */
    .form-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 28px 24px; margin-bottom: 16px;
    }
    .form-section-title {
      font-family: var(--font-serif); font-size: 0.82rem;
      letter-spacing: 0.1em; color: var(--accent);
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border);
    }
    .field-group { margin-bottom: 20px; }
    .field-group:last-child { margin-bottom: 0; }
    label {
      display: block; font-size: 0.74rem; letter-spacing: 0.06em;
      color: var(--muted); margin-bottom: 8px; text-transform: uppercase;
    }
    .required-mark { color: var(--accent); margin-left: 2px; }
    input, select {
      width: 100%; height: var(--tap); padding: 0 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text); font-family: var(--font-sans);
      font-size: 0.92rem; font-weight: 300;
      transition: border-color var(--ease);
      -webkit-appearance: none; appearance: none;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    input::placeholder { color: var(--muted); }
    select { cursor: pointer; }
    select option { background: #1a1a1a; }
    .select-wrap { position: relative; }
    .select-wrap::after {
      content: '▾'; position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--muted);
      pointer-events: none; font-size: 0.8rem;
    }
    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── 버튼 ── */
    .btn-primary {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 54px; background: var(--accent);
      color: #0e0e0e; font-family: var(--font-sans); font-size: 0.86rem;
      font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase;
      border: none; border-radius: 4px; cursor: pointer;
      transition: background var(--ease), opacity var(--ease);
      margin-top: 8px;
    }
    .btn-primary:hover { background: #dbb97e; }
    .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-confirm {
      display: flex; align-items: center; justify-content: center;
      width: 100%; height: 54px; background: var(--green); color: #fff;
      font-family: var(--font-sans); font-size: 0.86rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      border: none; border-radius: 4px; cursor: pointer;
      transition: opacity var(--ease);
    }
    .btn-confirm:hover { opacity: 0.85; }
    .btn-reset {
      width: 100%; height: 44px; background: transparent;
      border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); font-family: var(--font-sans);
      font-size: 0.78rem; letter-spacing: 0.06em;
      cursor: pointer; transition: var(--ease); margin-top: 12px;
    }
    .btn-reset:hover { border-color: var(--muted); color: var(--text); }

    /* ── 결과 패널 ── */
    #result-panel { display: none; animation: slideIn 0.3s ease; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: none; }
    }
    .result-card { border-radius: 8px; padding: 28px 24px; border: 1px solid; }
    .result-card.available {
      background: rgba(76,175,130,0.07); border-color: rgba(76,175,130,0.35);
    }
    .result-card.unavailable {
      background: rgba(224,90,90,0.07); border-color: rgba(224,90,90,0.3);
    }
    .result-icon { font-size: 2rem; margin-bottom: 12px; }
    .result-title {
      font-family: var(--font-serif); font-size: 1.2rem;
      font-weight: 300; margin-bottom: 8px;
    }
    .result-title.ok { color: var(--green); }
    .result-title.ng { color: var(--red); }
    .result-desc {
      font-size: 0.84rem; color: var(--muted);
      line-height: 1.75; margin-bottom: 24px;
    }
    .summary-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 16px; margin-bottom: 20px;
    }
    .summary-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 0; border-bottom: 1px solid rgba(42,42,42,0.6); font-size: 0.85rem;
    }
    .summary-row:last-child { border-bottom: none; }
    .summary-row .s-label { color: var(--muted); font-size: 0.74rem; letter-spacing: 0.04em; }
    .summary-row .s-value { font-weight: 400; }
    .contact-btns { display: flex; flex-direction: column; gap: 12px; }
    .btn-kakao {
      display: flex; align-items: center; gap: 14px; padding: 0 18px;
      height: 60px; background: #FEE500; border: none; border-radius: 4px;
      cursor: pointer; text-decoration: none; transition: opacity var(--ease);
    }
    .btn-kakao:hover { opacity: 0.88; }
    .kakao-ico {
      width: 36px; height: 36px; background: rgba(0,0,0,0.12); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .kakao-label { text-align: left; }
    .kakao-label strong { display: block; font-size: 0.88rem; font-weight: 700; color: #3A1D1D; }
    .kakao-label span { font-size: 0.74rem; color: #5a3a3a; }
    .btn-tel {
      display: flex; align-items: center; gap: 14px; padding: 0 18px;
      height: 60px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; text-decoration: none;
      transition: border-color var(--ease);
    }
    .btn-tel:hover { border-color: var(--accent); }
    .tel-ico {
      width: 36px; height: 36px; background: var(--border); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0;
    }
    .tel-label strong { display: block; font-size: 0.88rem; font-weight: 500; color: var(--text); }
    .tel-label span { font-size: 0.74rem; color: var(--muted); }

    /* ── 예약 완료 ── */
    #done-panel {
      display: none; text-align: center; padding: 40px 20px;
      animation: slideIn 0.3s ease;
    }
    .done-icon { font-size: 3rem; margin-bottom: 16px; }
    .done-title {
      font-family: var(--font-serif); font-size: 1.4rem;
      font-weight: 300; color: var(--green); margin-bottom: 10px;
    }
    .done-sub {
      font-size: 0.84rem; color: var(--muted);
      line-height: 1.8; margin-bottom: 28px;
    }

    /* ── NOTE ── */
    .note-box {
      margin-top: 20px; padding: 16px 18px; background: var(--surface);
      border-left: 2px solid rgba(201,169,110,0.5); font-size: 0.76rem;
      color: var(--muted); line-height: 1.8; border-radius: 0 4px 4px 0;
    }
    .note-box strong { color: var(--text); font-weight: 500; }

    /* ── 조회 결과 카드 ── */
    .lookup-res-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 18px 20px; margin-bottom: 12px;
    }
    .lookup-res-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 10px;
    }
    .lookup-res-date {
      font-family: var(--font-serif); font-size: 0.96rem;
      letter-spacing: 0.02em; color: var(--text);
    }
    .lookup-res-time { color: var(--accent); font-weight: 500; font-size: 0.9rem; }
    .lookup-res-info { font-size: 0.8rem; color: var(--muted); margin-bottom: 14px; }
    .btn-cancel-res {
      width: 100%; height: 40px; background: transparent;
      border: 1px solid rgba(224,90,90,0.4); border-radius: 4px;
      color: var(--red); font-family: var(--font-sans);
      font-size: 0.78rem; letter-spacing: 0.06em; cursor: pointer;
      transition: background var(--ease);
    }
    .btn-cancel-res:hover { background: rgba(224,90,90,0.1); }
    .lookup-empty {
      text-align: center; padding: 40px 20px;
      color: var(--muted); font-size: 0.84rem; line-height: 1.8;
    }

    /* ── 로딩 스피너 ── */
    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.2); border-top-color: #0e0e0e;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 8px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── FOOTER ── */
    .page-footer {
      text-align: center; margin-top: 40px; padding-top: 28px;
      border-top: 1px solid var(--border); font-size: 0.72rem; color: var(--muted);
    }

    /* ── 에러 ── */
    .field-error { font-size: 0.72rem; color: var(--red); margin-top: 6px; }
    input.error, select.error { border-color: var(--red); }

    @media (min-width: 500px) {
      .page-wrap { padding: 90px 32px 60px; }
      .form-card { padding: 32px 32px; }
    }
  </style>
</head>

let lang = 'ko';
let lastUnavailState = null; // 언어 전환 시 결과 패널 재렌더링용

// ── 언어 적용 ──
function applyLang(l) {
  lang = l;
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = T[l][el.dataset.i18n];
    if (v !== undefined) el.textContent = v;
  });
  document.getElementById('fName').placeholder  = T[l].name_placeholder;
  document.getElementById('fPhone').placeholder = T[l].phone_placeholder;
  document.getElementById('lPhone').placeholder = T[l].phone_placeholder;
  buildPeopleSelect(document.getElementById('fPeople').value);
  const fTime = document.getElementById('fTime');
  if (fTime.options.length === 1 && !fTime.options[0].value)
    fTime.options[0].textContent = T[l].time_placeholder;
  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === l));
  document.title = {
    ko:'저녁 예약 · Mokko Izakaya',
    de:'Abendreservierung · Mokko Izakaya',
    en:'Dinner Reservation · Mokko Izakaya',
  }[l];
  // 결과 패널이 열려 있으면 새 언어로 재렌더링
  const rp = document.getElementById('result-panel');
  if (lastUnavailState !== null && rp && rp.style.display !== 'none') {
    renderUnavailPanel(lastUnavailState.isDayFull);
  }
}

function buildPeopleSelect(cur) {
  const sel = document.getElementById('fPeople');
  sel.innerHTML = `<option value="">${T[lang].people_placeholder}</option>`;
  for (let i = 1; i <= 20; i++) {
    const suf = i === 1 ? T[lang].people_suffix_one : T[lang].people_suffix_many;
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = i + suf;
    sel.appendChild(opt);
  }
  if (cur) sel.value = cur;
}

document.querySelectorAll('.lang-btn').forEach(b =>
  b.addEventListener('click', () => applyLang(b.dataset.lang)));

// ── 섹션 전환 ──
function showSection(sec, el) {
  document.getElementById('booking-section').style.display = sec === 'booking' ? 'block' : 'none';
  document.getElementById('lookup-section').style.display  = sec === 'lookup'  ? 'block' : 'none';
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

// ── 날짜 초기화 ──
(function initDate() {
  const fmt = d => d.toISOString().slice(0,10);
  const today = new Date();
  const max   = new Date(today); max.setDate(max.getDate() + 60);
  const fd = document.getElementById('fDate');
  fd.min = fmt(today); fd.max = fmt(max);
})();

document.getElementById('fDate').addEventListener('change', function() {
  const val = this.value;
  const fTime = document.getElementById('fTime');
  fTime.innerHTML = '';
  if (!val) { fTime.innerHTML = `<option value="">${T[lang].time_placeholder}</option>`; return; }
  const dow = new Date(val + 'T00:00:00').getDay();
  const slots = TIME_SLOTS[dow];
  if (!slots) { fTime.innerHTML = `<option value="">${T[lang].time_closed}</option>`; return; }
  const now = new Date(); const isToday = val === now.toISOString().slice(0,10);
  // 당일 17시 이후 → 온라인 예약 마감
  if (isToday && now.getHours() >= 17) {
    fTime.innerHTML = `<option value="">${T[lang].time_cutoff}</option>`;
    clearErrors();
    return;
  }
  let has = false;
  slots.forEach(t => {
    if (isToday) {
      const [h,m] = t.split(':').map(Number);
      if (h*60+m <= now.getHours()*60+now.getMinutes()) return;
    }
    const opt = document.createElement('option');
    opt.value = t; opt.textContent = t; fTime.appendChild(opt); has = true;
  });
  if (!has) fTime.innerHTML = `<option value="">${T[lang].time_done}</option>`;
  clearErrors();
});

// ── Firebase 헬퍼 ──
async function getCapacity() {
  try {
    const snap = await db.ref('settings/capacity').once('value');
    const c = snap.val();
    if (c && c.available) return c;
    return { available: DEFAULT_CAPACITY, total: DEFAULT_CAPACITY };
  } catch { return { available: DEFAULT_CAPACITY, total: DEFAULT_CAPACITY }; }
}

async function getBookedCount(date, time) {
  const snap = await db.ref('reservations').orderByChild('date').equalTo(date).once('value');
  let total = 0;
  const CLOSING = '23:00';
  snap.forEach(child => {
    const r = child.val();
    const resEnd = r.endTime || CLOSING;
    // 이 예약이 time 시점에 착석 중인가: 시작 <= time < 종료
    if (r.time <= time && time < resEnd) total += r.people;
  });
  return total;
}

async function getTotalDayCount(date) {
  const snap = await db.ref('reservations').orderByChild('date').equalTo(date).once('value');
  let total = 0;
  snap.forEach(child => { total += (child.val().people || 0); });
  return total;
}

async function checkDuplicate(phone, date, time) {
  const snap = await db.ref('reservations').orderByChild('phone').equalTo(phone).once('value');
  let dup = false;
  snap.forEach(child => { const r = child.val(); if (r.date === date && r.time === time) dup = true; });
  return dup;
}

// ── 유효성 검사 ──
function validate() {
  let ok = true;
  const t = T[lang];
  clearErrors();
  const date   = document.getElementById('fDate').value;
  const time   = document.getElementById('fTime').value;
  const people = document.getElementById('fPeople').value;
  const name   = document.getElementById('fName').value.trim();
  const phone  = document.getElementById('fPhone').value.trim();
  if (!date) { showErr('err-date', t.err_date); ok=false; }
  else if (!TIME_SLOTS[new Date(date+'T00:00:00').getDay()]) { showErr('err-date', t.err_sunday); ok=false; }
  if (!time)   { showErr('err-time',   t.err_time);   ok=false; }
  if (!people) { showErr('err-people', t.err_people); ok=false; }
  if (!name)   { showErr('err-name',   t.err_name);   ok=false; }
  if (!phone)  { showErr('err-phone',  t.err_phone);  ok=false; }
  else if (!/^[\d\s\-\+\(\)]{6,20}$/.test(phone)) { showErr('err-phone', t.err_phone_invalid); ok=false; }
  return ok;
}
function showErr(id, msg) { const el=document.getElementById(id); if(el) el.textContent=msg; }
function clearErrors() {
  ['err-date','err-time','err-people','err-name','err-phone'].forEach(id=>{
    const el=document.getElementById(id); if(el) el.textContent='';
  });
}

// ── 날짜 표시 ──
function formatDateStr(dv) {
  const d = new Date(dv+'T00:00:00'), day = DAY_NAMES[lang][d.getDay()];
  if (lang==='ko') return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${day})`;
  if (lang==='de') return `${d.getDate()}.${d.getMonth()+1}.${d.getFullYear()} (${day})`;
  return d.toLocaleDateString('en-US',{weekday:'short',month:'long',day:'numeric',year:'numeric'});
}

// ── 인원 표시 ──
function peopleSuffix(n) {
  if (lang==='ko') return n + '명';
  if (lang==='de') return n + (n===1?' Person':' Personen');
  return n + (n===1?' guest':' guests');
}

// ── 예약 불가 패널 렌더링 (언어 전환 시 재사용) ──
function renderUnavailPanel(isDayFull) {
  const t = T[lang];
  const telBtn   = `<a href="${TEL_HREF}" class="btn-tel"><div class="tel-ico">📞</div><div class="tel-label"><strong>${TEL}</strong><span>${t.tel_sub}</span></div></a>`;
  const kakaoBtn = `<a href="${KAKAO_URL}" target="_blank" rel="noopener" class="btn-kakao"><div class="kakao-ico">💬</div><div class="kakao-label"><strong>${t.kakao_title}</strong></div></a>`;
  const contactBtns = isDayFull ? telBtn + kakaoBtn : telBtn;
  const msg = isDayFull ? t.unavail_full : t.unavail_partial;
  // 전석 마감: 아이콘+타이틀+메시지 / 전화만 가능: 메시지만 (타이틀 없음)
  const headerHtml = isDayFull
    ? `<div class="result-icon">😔</div><div class="result-title ng">${t.unavail_title}</div>`
    : `<div class="result-icon">📞</div>`;
  document.getElementById('result-panel').innerHTML = `
    <div class="result-card unavailable">
      ${headerHtml}
      <div class="result-desc">${msg}</div>
      <div class="contact-btns">${contactBtns}</div>
      <button class="btn-reset" onclick="goBack()">${t.btn_other}</button>
    </div>`;
}

// ── 예약 가능 여부 확인 ──
async function checkAvailability() {
  if (!validate()) return;
  const btn = document.getElementById('btnCheck');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;

  try {
    const t      = T[lang];
    const date   = document.getElementById('fDate').value;
    const time   = document.getElementById('fTime').value;
    const people = parseInt(document.getElementById('fPeople').value);
    const name   = document.getElementById('fName').value.trim();
    const phone  = document.getElementById('fPhone').value.trim();

    // ── 당일/단체 사전 차단 ──
    const nowChk = new Date();
    const isToday = date === nowChk.toISOString().slice(0,10);
    const pastCutoff = isToday && nowChk.getHours() >= 17;

    const showSpecialPanel = (icon, title, msg, btns) => {
      document.getElementById('result-panel').style.display = 'block';
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result-panel').innerHTML = `
        <div class="result-card unavailable">
          <div class="result-icon">${icon}</div>
          <div class="result-title ng">${title}</div>
          <div class="result-desc">${msg}</div>
          <div class="contact-btns">${btns}</div>
          <button class="btn-reset" onclick="goBack()">${t.btn_other}</button>
        </div>`;
      document.getElementById('result-panel').scrollIntoView({behavior:'smooth',block:'start'});
    };

    const telBtn = `<a href="${TEL_HREF}" class="btn-tel"><div class="tel-ico">📞</div><div class="tel-label"><strong>${TEL}</strong><span>${t.tel_sub}</span></div></a>`;
    const kakaoBtn = `<a href="${KAKAO_URL}" target="_blank" rel="noopener" class="btn-kakao"><div class="kakao-ico">💬</div><div class="kakao-label"><strong>${t.kakao_title}</strong></div></a>`;

    // 당일 17시 이후 → 전화만
    if (pastCutoff) {
      showSpecialPanel('🕔', t.today_cutoff_title, t.today_cutoff_msg, telBtn);
      return;
    }

    // 9인 이상 단체
    if (people >= 9) {
      if (isToday) {
        // 당일 단체 → 전화만 (카카오톡 당일 불가)
        showSpecialPanel('📞', t.group_title, t.group_today_msg, telBtn);
      } else {
        // 미래 단체 → 카카오톡만
        showSpecialPanel('💬', t.group_title, t.group_kakao_msg, kakaoBtn);
      }
      return;
    }

    const [cap, booked, totalDay] = await Promise.all([
      getCapacity(),
      getBookedCount(date, time),
      getTotalDayCount(date),
    ]);

    const remaining  = cap.available - booked;
    const isDayFull  = totalDay >= (cap.total || cap.available);
    const dateStr    = formatDateStr(date);

    document.getElementById('result-panel').style.display = 'block';
    document.getElementById('form-section').style.display = 'none';

    if (people <= remaining) {
      document.getElementById('result-panel').innerHTML = `
        <div class="result-card available">
          <div class="result-icon">🎉</div>
          <div class="result-title ok">${t.avail_title}</div>
          <div class="result-desc">${t.avail_desc_pre}</div>
          <div class="summary-box">
            <div class="summary-row"><span class="s-label">${t.s_date}</span><span class="s-value">${dateStr}</span></div>
            <div class="summary-row"><span class="s-label">${t.s_time}</span><span class="s-value">${time}</span></div>
            <div class="summary-row"><span class="s-label">${t.s_people}</span><span class="s-value">${peopleSuffix(people)}</span></div>
            <div class="summary-row"><span class="s-label">${t.s_name}</span><span class="s-value">${escH(name)}</span></div>
            <div class="summary-row"><span class="s-label">${t.s_phone}</span><span class="s-value">${escH(phone)}</span></div>
          </div>
          <button class="btn-confirm" onclick="confirmReservation('${escA(date)}','${time}',${people},'${escA(name)}','${escA(phone)}','${escA(dateStr)}')">
            ${t.btn_confirm}
          </button>
          <button class="btn-reset" onclick="goBack()">${t.btn_back}</button>
        </div>`;
    } else {
      lastUnavailState = { isDayFull };
      renderUnavailPanel(isDayFull);
    }
    document.getElementById('result-panel').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    alert('오류가 발생했습니다. 잠시 후 다시 시도해 주세요.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<span data-i18n="btn_check">${T[lang].btn_check}</span>`;
  }
}

// ── 예약 확정 ──
async function confirmReservation(date, time, people, name, phone, dateStr) {
  const t = T[lang];
  try {
    const dup = await checkDuplicate(phone, date, time);
    if (dup) { alert(t.dup_alert); return; }

    await db.ref('reservations').push({
      date, time, people, name, phone, createdAt: new Date().toISOString()
    });

    document.getElementById('result-panel').style.display = 'none';
    const dp = document.getElementById('done-panel');
    dp.style.display = 'block';
    document.getElementById('done-msg').innerHTML = t.done_msg
      .replace('{name}', escH(name)).replace('{date}', dateStr)
      .replace('{time}', time).replace('{people}', peopleSuffix(people))
      .replace('{phone}', escH(phone));
    dp.scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    alert('예약 중 오류가 발생했습니다. 전화 또는 카카오톡으로 문의해 주세요.');
  }
}

function goBack() {
  lastUnavailState = null;
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetAll() {
  document.getElementById('fDate').value = '';
  document.getElementById('fTime').innerHTML = `<option value="">${T[lang].time_placeholder}</option>`;
  document.getElementById('fPeople').value = '';
  document.getElementById('fName').value = '';
  document.getElementById('fPhone').value = '';
  document.getElementById('result-panel').style.display = 'none';
  document.getElementById('done-panel').style.display = 'none';
  document.getElementById('form-section').style.display = 'block';
  clearErrors();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── 내 예약 조회 ──
async function lookupReservations() {
  const phone = document.getElementById('lPhone').value.trim();
  const errEl = document.getElementById('err-lphone');
  errEl.textContent = '';
  if (!phone) { errEl.textContent = T[lang].err_lphone; return; }

  const btn = document.getElementById('btnLookup');
  btn.disabled = true;
  btn.innerHTML = `<span class="spinner"></span>`;

  try {
    const today = new Date().toISOString().slice(0,10);
    const snap  = await db.ref('reservations').orderByChild('phone').equalTo(phone).once('value');
    const results = [];
    snap.forEach(child => {
      const r = child.val();
      if (r.date >= today) results.push({id: child.key, ...r});
    });
    results.sort((a,b) => (a.date+a.time).localeCompare(b.date+b.time));

    const container = document.getElementById('lookup-result');
    if (results.length === 0) {
      container.innerHTML = `<div class="lookup-empty">📭<br />${T[lang].lookup_empty}</div>`;
    } else {
      container.innerHTML = results.map(r => {
        const ds = formatDateStr(r.date);
        return `
          <div class="lookup-res-card" id="card-${r.id}">
            <div class="lookup-res-top">
              <div>
                <div class="lookup-res-date">${ds}</div>
                <div class="lookup-res-time">${r.time}</div>
              </div>
              <div style="text-align:right">
                <div style="color:var(--accent);font-weight:500;font-size:1rem">${peopleSuffix(r.people)}</div>
                <div style="color:var(--muted);font-size:0.76rem">${escH(r.name)}</div>
              </div>
            </div>
            <button class="btn-cancel-res" onclick="cancelReservation('${r.id}')">
              ${T[lang].lookup_cancel_btn}
            </button>
          </div>`;
      }).join('');
    }
  } catch(e) {
    document.getElementById('lookup-result').innerHTML =
      `<div class="lookup-empty">오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</div>`;
  } finally {
    btn.disabled = false;
        btn.innerHTML = `<span data-i18n="lookup_btn">${T[lang].lookup_btn}</span>`;
  }
}

// ── 예약 취소 ──
async function cancelReservation(id) {
  if (!confirm(T[lang].lookup_cancel_confirm)) return;
  try {
    await db.ref('reservations/' + id).remove();
    const card = document.getElementById('card-' + id);
    if (card) {
      card.style.opacity = '0.5';
      card.innerHTML = `<div style="text-align:center;padding:16px;color:var(--green);font-size:0.84rem">✓ ${T[lang].lookup_cancelled}</div>`;
      setTimeout(() => card.remove(), 2000);
    }
  } catch(e) {
    alert('취소 중 오류가 발생했습니다. 전화 또는 카카오톡으로 문의해 주세요.');
  }
}

// ── XSS 방지 ──
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) { return String(s).replace(/'/g,"\\'").replace(/\\/g,'\\\\'); }

// ── 초기화 — URL 파라미터 lang 우선 적용 ──
(function() {
  const urlLang = new URLSearchParams(window.location.search).get('lang');
  const validLangs = ['ko', 'de', 'en'];
  applyLang(validLangs.includes(urlLang) ? urlLang : 'ko');
})();
</script>
